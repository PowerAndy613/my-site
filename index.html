<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>股票資料展示</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    button { padding: 8px 12px; margin-bottom: 10px; }
    pre { background: #f4f4f4; padding: 10px; border: 1px solid #ccc; }
  </style>
</head>
<body>
  <h1>股票資料展示 (透過 yfin-proxy)</h1>
  <button onclick="loadStock()">抓取 AAPL 資料</button>
  <pre id="output">尚未抓取資料</pre>

  <script>
    async function loadStock() {
      try {
        // 呼叫你 Render 上的 yfin-proxy API
        const response = await fetch("https://yfin-proxy.onrender.com/history/AAPL?start=2026-06-15&end=2026-06-27");
        if (!response.ok) {
          throw new Error("HTTP 錯誤: " + response.status);
        }
        const data = await response.json();

        // 顯示 JSON 資料在網頁上
        document.getElementById("output").innerText = JSON.stringify(data, null, 2);
      } catch (error) {
        document.getElementById("output").innerText = "抓取失敗：" + error;
      }
    }
  </script>
</body>
</html>
