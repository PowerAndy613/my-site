<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>🔐 投資人FCN儀表板 · 登入</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    *{box-sizing:border-box}
    body{
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",sans-serif;
      margin:0;
      padding:10px;
      padding-bottom:92px;
      background:#f6f7fb;
      color:#111;
      -webkit-font-smoothing:antialiased;
    }
    h1{font-size:20px;margin:0 0 10px;line-height:1.2}
    .card{
      background:#fff;
      border-radius:16px;
      box-shadow:0 2px 10px rgba(0,0,0,.06);
      padding:12px;
      margin-bottom:10px
    }
    .section-title{font-size:15px;font-weight:800;margin-bottom:8px}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    label{display:block;font-size:12px;color:#667085;margin-bottom:4px}
    input,button{
      width:100%;
      box-sizing:border-box;
      font-size:14px;
      border-radius:12px;
      border:1px solid #d9deea;
      padding:10px;
      background:#fff
    }
    button{
      background:#4f46e5;
      color:#fff;
      border:0;
      font-weight:800;
      cursor:pointer;
      min-height:42px
    }
    .secondary{background:#e5e7eb;color:#111}
    .danger{background:#ef4444;color:#fff}
    .success{background:#10b981;color:#fff}
    .outline{background:transparent;color:#fff;border:1px solid rgba(255,255,255,0.3)}
    .chart-toggle-btn{background:#e5e7eb;color:#111;border:0;padding:4px 12px;border-radius:10px;font-size:12px;font-weight:700;min-height:30px;width:auto;cursor:pointer}
    .chart-toggle-btn:hover{background:#d1d5db}

    .file-input-hidden{display:none}

    .client-card{
      border:2px solid #4f46e5;
      border-radius:18px;
      background:#f8f7ff;
      margin-bottom:14px;
      overflow:hidden
    }
    .client-header{
      background:#4f46e5;
      color:#fff;
      padding:10px 14px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      flex-wrap:wrap;
      gap:6px;
      cursor:pointer
    }
    .client-header .client-name{
      font-weight:900;
      font-size:16px;
      background:transparent;
      border:none;
      color:#fff;
      padding:2px 6px;
      border-radius:6px;
      min-width:60px;
      cursor:text;
      flex:1;
    }
    .client-header .client-name:focus{
      outline:2px solid rgba(255,255,255,0.5);
      background:rgba(255,255,255,0.15);
    }
    .client-header .client-name::placeholder{color:rgba(255,255,255,0.6)}
    .client-header .client-actions{display:flex;gap:4px;flex-wrap:wrap}
    .client-header .client-actions button{
      background:rgba(255,255,255,.2);
      color:#fff;
      border:0;
      padding:4px 10px;
      border-radius:10px;
      font-size:11px;
      font-weight:700;
      min-height:28px;
      width:auto;
      transition:background .2s;
    }
    .client-header .client-actions button:hover{background:rgba(255,255,255,.35)}
    .client-header .client-actions button.outline{background:transparent;border:1px solid rgba(255,255,255,0.3)}
    .client-header .client-actions button.outline:hover{background:rgba(255,255,255,0.15)}
    .client-body{padding:10px}
    .client-body .group-list{margin-top:6px}

    details.group-card{
      border:1px solid #d9deea;
      border-radius:14px;
      background:#fff;
      margin-bottom:8px;
      overflow:hidden
    }
    details.group-card[open]{box-shadow:0 2px 8px rgba(0,0,0,.06)}
    summary.group-summary{
      list-style:none;
      cursor:pointer;
      padding:10px 14px;
      font-weight:900;
      font-size:15px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:8px;
      background:#fafbff;
      border-bottom:1px solid #e5e7eb;
      flex-wrap:wrap;
    }
    summary.group-summary::-webkit-details-marker{display:none}
    summary.group-summary::after{
      content:"▾";
      font-size:14px;
      color:#667085;
      transition:transform .15s ease
    }
    details.group-card[open] summary.group-summary::after{transform:rotate(180deg)}
    .group-body{padding:10px}
    .group-head{
      display:grid;
      grid-template-columns:1fr 1fr 1fr 1fr 80px;
      gap:6px;
      align-items:end;
      margin-bottom:8px
    }
    .group-limits{
      display:grid;
      grid-template-columns:1fr 1fr 1fr 1fr 1fr;
      gap:6px;
      margin-bottom:8px
    }
    .group-dates{
      border:1px solid #e2e8f0;
      border-radius:12px;
      padding:10px;
      margin-bottom:10px;
      background:#fafcff;
    }
    .group-date-toggle-container {
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:8px;
      padding-bottom:6px;
      border-bottom:1px dashed #e2e8f0;
    }
    .group-date-toggle-label {font-size:13px;font-weight:800;color:#334155}
    .switch {
      position:relative;display:inline-block;width:40px;height:22px;
    }
    .switch input{opacity:0;width:0;height:0}
    .slider{
      position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;
      background:#cbd5e1;transition:.3s;border-radius:22px;
    }
    .slider:before{
      position:absolute;content:"";height:16px;width:16px;left:3px;bottom:3px;
      background:#fff;transition:.3s;border-radius:50%;
    }
    input:checked + .slider{background:#4f46e5}
    input:checked + .slider:before{transform:translateX(18px)}

    .stock-row{
      display:grid;
      grid-template-columns:1fr 1fr .9fr 60px;
      gap:6px;
      margin-top:6px;
      align-items:end
    }
    .stock-row button{background:#ef4444;padding:8px 4px;min-height:36px;font-size:12px}
    .group-actions{
      display:flex;gap:6px;margin-top:8px;flex-wrap:wrap
    }
    .group-actions button{flex:1 1 100px;min-height:36px;font-size:13px}

    .stocks{
      display:grid;
      grid-template-columns:repeat(2, minmax(0, 1fr));
      gap:6px
    }
    .stock-card{
      background:linear-gradient(180deg,#fff 0%,#fbfbff 100%);
      border-radius:12px;
      padding:8px 10px;
      border:2px solid #d8deea;
      box-shadow:0 1px 4px rgba(0,0,0,.04);
      min-height:90px;
      display:flex;
      flex-direction:column;
      justify-content:center;
      cursor:pointer;
      user-select:none
    }
    .stock-card.ko{background:#dbeafe;border:4px solid #3b82f6}
    .stock-card.ki{background:#fecaca;border:4px solid #ef4444}
    .stock-card.strike{background:#fef3c7;border:4px solid #f59e0b}
    .stock-card.normal{background:#d1fae5;border:4px solid #10b981}
    .stock-card.ko .line-pct {color:#2563eb}
    .stock-card.ki .line-pct {color:#dc2626}
    .stock-card.strike .line-pct {color:#d97706}
    .stock-card.normal .line-pct {color:#059669}
    
    .status-badge{
      display:inline-block;padding:2px 8px;border-radius:8px;font-size:11px;font-weight:900;color:#fff;width:max-content;margin-top:4px
    }
    .status-badge.ko{background:#3b82f6}
    .status-badge.ki{background:#ef4444}
    .status-badge.strike{background:#f59e0b}
    .status-badge.normal{background:#10b981}

    .line1{font-size:15px;font-weight:900;line-height:1.2}
    .line2{font-size:12px;margin-top:2px;line-height:1.2;color:#1f2937}
    .line-pct{font-size:14px;margin-top:4px;line-height:1.2;font-weight:900}
    
    .small{color:#6b7280;font-size:12px;margin-top:6px;line-height:1.4}
    .tag-fcn{font-size:12px;font-weight:600;background:#e5e7eb;padding:1px 10px;border-radius:16px;white-space:nowrap}
    .tag-apr{font-size:12px;font-weight:600;background:#dbeafe;color:#1d4ed8;padding:1px 10px;border-radius:16px;white-space:nowrap}
    .tag-status{font-size:12px;font-weight:700;padding:1px 10px;border-radius:16px;white-space:nowrap}
    .tag-status.ko{background:#3b82f6;color:#fff}
    .tag-status.ki{background:#ef4444;color:#fff}
    .tag-status.strike{background:#f59e0b;color:#fff}
    .tag-status.normal{background:#10b981;color:#fff}
    .tag-product-id{font-size:12px;font-weight:700;background:#f3e8ff;color:#6b21a8;padding:1px 10px;border-radius:16px;white-space:nowrap}

    .modal{
      display:none;position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.45);padding:12px;box-sizing:border-box
    }
    .modal.show{display:block}
    .modal-dialog{
      max-width:980px;margin:4vh auto;background:#fff;border-radius:18px;overflow:hidden;box-shadow:0 10px 30px rgba(0,0,0,.2)
    }
    .modal-header{padding:12px 16px;background:#f8f9fc;display:flex;justify-content:space-between;align-items:center;gap:10px}
    .modal-title{font-size:18px;font-weight:800}
    .modal-body{padding:14px}
    .modal-close{width:auto;background:#111;color:#fff;border:0;padding:8px 14px;border-radius:12px}
    .chart-wrap{height:280px}
    .info-line{font-size:14px;color:#444;margin-bottom:8px;line-height:1.5}

    .group-pie-wrap{border-top:1px solid #e5e7eb;padding-top:10px;margin-top:8px}
    .profit-chart-wrap{margin-top:12px;padding-top:10px;border-top:2px solid #e5e7eb}

    .mobile-bottom-nav{display:none}

    .btn-delete-group,
    .btn-delete-stock,
    .btn-delete-client {
      cursor:pointer !important;
      pointer-events:auto !important;
      touch-action:manipulation !important;
    }

    .fcn-pie-card {
      margin-top:10px;
      border-top:2px solid #e5e7eb;
      padding-top:10px;
    }
    .fcn-pie-card .pie-title {
      font-weight:700;
      font-size:14px;
      margin-bottom:6px;
      color:#1f2937;
    }
    .fcn-pie-card .total-fcn {
      font-size:14px;
      color:#4b5563;
      margin-bottom:8px;
    }
    .fcn-pie-card .total-fcn strong {
      color:#f59e0b;
      font-size:16px;
    }

    .result-detail {
      background:#f8fafc;
      border-radius:8px;
      padding:8px 12px;
      margin-top:4px;
      font-size:13px;
      color:#1e293b;
      border-left:3px solid #4f46e5;
    }
    .result-detail strong {color:#0f172a}

    .final-value-pie-card {
      margin-top:12px;
      padding-top:12px;
      border-top:2px solid #4f46e5;
    }
    .final-value-pie-card .pie-title {
      font-weight:700;
      font-size:15px;
      margin-bottom:6px;
      color:#1f2937;
    }
    .final-value-pie-card .total-asset {
      font-size:14px;
      color:#4b5563;
      margin-bottom:8px;
    }
    .final-value-pie-card .total-asset strong {
      color:#4f46e5;
      font-size:16px;
    }

    /* ★★★ 累積配息收益明細表 ★★★ */
    .coupon-detail-table {
      width:100%;
      border-collapse:collapse;
      font-size:13px;
      margin-top:8px;
    }
    .coupon-detail-table th {
      background:#f1f5f9;
      color:#1e293b;
      font-weight:700;
      padding:6px 8px;
      text-align:center;
      border:1px solid #e2e8f0;
    }
    .coupon-detail-table td {
      padding:5px 8px;
      text-align:center;
      border:1px solid #e2e8f0;
      font-variant-numeric:tabular-nums;
    }
    .coupon-detail-table tr:nth-child(even) td {
      background:#f8fafc;
    }
    .coupon-detail-table .total-row td {
      background:#e2e8f0;
      font-weight:700;
    }
    .coupon-detail-table .ko-ended td {
      background:#fef2f2 !important;
      color:#9ca3af;
    }
    .coupon-detail-table .ko-ended td:first-child::after {
      content: " ⛔ 已提前出場";
      font-size:10px;
      color:#ef4444;
    }
    .coupon-chart-container {
      margin-top:10px;
      padding-top:10px;
      border-top:1px solid #e5e7eb;
    }
    .coupon-chart-container .chart-title {
      font-weight:700;
      font-size:13px;
      color:#1f2937;
      margin-bottom:4px;
    }

    /* CSV 按鈕樣式 */
    .btn-export-csv {
      background:#10b981;
      color:#fff;
      border:0;
      font-weight:800;
      cursor:pointer;
      min-height:42px;
      border-radius:12px;
      padding:10px;
    }
    .btn-export-csv:hover {
      background:#059669;
    }
    .btn-import-csv {
      background:#8b5cf6;
      color:#fff;
      border:0;
      font-weight:800;
      cursor:pointer;
      min-height:42px;
      border-radius:12px;
      padding:10px;
    }
    .btn-import-csv:hover {
      background:#7c3aed;
    }
    
    .btn-Expand-details-of-earnings {
      background:#93c5fd;
      color:#111;
      border:0;
      font-weight:800;
      cursor:pointer;
      min-height:42px;
      border-radius:12px;
      padding:10px;
    }
    .btn-Expand-details-of-earnings:hover {
      background:#93c5fd;
    }
    
    .btn-Collapse-details-of-earnings {
      background:#fde68a;
      color:#111;
      border:0;
      font-weight:800;
      cursor:pointer;
      min-height:42px;
      border-radius:12px;
      padding:10px;
    }
    
    .btn-Collapse-details-of-earnings:hover {
      background:#fde68a;
    }

		.mobile-top-nav {
		  position: fixed;
		  top: 0;
		  left: 0;
		  width: 100%;
		  display: flex;
		  flex-wrap: wrap;              /* 超過寬度就換行 */
		  justify-content: space-around;
		  background-color: #f8f9fa;
		  border-bottom: 1px solid #ccc;
		  padding: 10px 0;
		}
		.mobile-top-nav a {
		  flex: 1 0 16%;                /* 每個按鍵佔 16% 寬度 */
		  text-align: center;
		  text-decoration: none;
		  color: #333;
		  padding: 8px 0;
		}


    /* 日期標籤樣式 */
    .tag-date {
      font-size:12px;
      font-weight:600;
      background:#e0e7ff;
      color:#4338ca;
      padding:1px 10px;
      border-radius:16px;
      white-space:nowrap;
    }

    /* 產品清單彈窗樣式 */
    .product-list-modal .modal-dialog {
      max-width: 700px;
    }
    .product-list-modal .modal-body {
      max-height: 70vh;
      overflow-y: auto;
    }
    .product-list-modal table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }
    .product-list-modal th {
      background: #f1f5f9;
      padding: 8px 12px;
      text-align: left;
      border-bottom: 2px solid #e2e8f0;
    }
    .product-list-modal td {
      padding: 8px 12px;
      border-bottom: 1px solid #e2e8f0;
    }
    .product-list-modal tr:hover td {
      background: #f8fafc;
    }
    .product-list-modal .highlight {
      background: #dbeafe;
    }

    /* 查找產品輸入對話框 */
    .search-dialog-overlay {
      position: fixed;
      inset: 0;
      z-index: 99998;
      background: rgba(0,0,0,0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .search-dialog-overlay.hidden { display: none; }
    .search-dialog {
      background: #fff;
      border-radius: 20px;
      padding: 28px 24px;
      max-width: 420px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .search-dialog h3 {
      margin-top: 0;
      font-size: 18px;
      font-weight: 800;
      color: #1e293b;
    }
    .search-dialog .field {
      margin-bottom: 16px;
    }
    .search-dialog .field label {
      font-weight: 700;
      font-size: 13px;
      color: #334155;
    }
    .search-dialog .field input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #d1d5db;
      border-radius: 14px;
      font-size: 15px;
    }
    .search-dialog .actions {
      display: flex;
      gap: 10px;
      margin-top: 8px;
    }
    .search-dialog .actions button {
      flex: 1;
      padding: 12px;
      border-radius: 14px;
      border: 0;
      font-weight: 800;
      cursor: pointer;
    }
    .search-dialog .actions .btn-primary {
      background: #4f46e5;
      color: #fff;
    }
    .search-dialog .actions .btn-secondary {
      background: #e5e7eb;
      color: #111;
    }

    @media (max-width:760px){
      body{padding-bottom:84px}
      .grid,.group-limits,.group-head{grid-template-columns:1fr}
      .group-head{grid-template-columns:1fr 1fr}
      .group-head > div:last-child{grid-column:1/3}
      .stock-row{grid-template-columns:1fr 1fr .9fr 60px}
      .client-header{flex-direction:column;align-items:stretch}
      .client-header .client-actions{justify-content:flex-start}
      .group-head{grid-template-columns:1fr 1fr}
      .group-head > div:last-child{grid-column:1/3}
      .group-limits{grid-template-columns:1fr 1fr}
      .mobile-bottom-nav{
        display:flex;position:fixed;left:0;right:0;bottom:0;z-index:10000;
        background:#fff;border-top:1px solid #e5e7eb;box-shadow:0 -4px 16px rgba(0,0,0,.08);
        padding:6px 8px calc(6px + env(safe-area-inset-bottom));gap:4px
      }
      .mobile-bottom-nav button{
        flex:1;min-height:44px;padding:4px 2px;border-radius:12px;border:1px solid #d9deea;
        background:#f9fafb;color:#111;display:flex;flex-direction:column;align-items:center;
        justify-content:center;gap:1px;font-size:10px;font-weight:800;line-height:1
      }
      .mobile-bottom-nav .nav-icon{font-size:16px;line-height:1}
      .mobile-bottom-nav .nav-text{font-size:9px;line-height:1}
      .stocks{grid-template-columns:repeat(2, minmax(0, 1fr))}
      summary.group-summary{font-size:13px}
      .tag-fcn,.tag-apr,.tag-status,.tag-product-id{font-size:10px;padding:1px 6px}
      .line1{font-size:13px}
      .line2{font-size:11px}
      .line-pct{font-size:12px}
      .group-head button,
      .stock-row button,
      .group-actions button,
      .client-actions button {
        min-height:40px !important;
        min-width:44px !important;
      }
      .client-header .client-actions button {
        font-size:10px !important;
        padding:4px 8px !important;
        min-height:32px !important;
      }
      .chart-wrap{height:220px}
      .final-value-pie-card .pie-title {font-size:13px}
      .fcn-pie-card .pie-title {font-size:13px}
      .coupon-detail-table {font-size:11px}
      .coupon-detail-table th,.coupon-detail-table td {padding:3px 4px}
      .coupon-detail-table .ko-ended td:first-child::after {
        content: " ⛔";
        font-size:9px;
      }
      .product-list-modal .modal-dialog {
        margin: 2vh auto;
        max-width: 95%;
      }
      .product-list-modal table { font-size: 12px; }
      .product-list-modal th, .product-list-modal td { padding: 4px 6px; }
    }
    @media (min-width:760px){
      body{padding:14px;padding-bottom:14px}
      .stocks{grid-template-columns:repeat(auto-fill,minmax(200px,1fr))}
      .stock-card{min-height:96px;padding:12px}
      .line1{font-size:17px}
      .line2{font-size:14px}
      .line-pct{font-size:15px}
      .chart-wrap{height:340px}
    }

    /* 登入覆蓋層 */
    #loginOverlay {
      position: fixed;
      inset: 0;
      z-index: 99999;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(6px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    #loginOverlay.hidden { display: none; }
    .login-box {
      background: #fff;
      max-width: 400px;
      width: 100%;
      border-radius: 28px;
      padding: 32px 24px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      text-align: center;
    }
    .login-box h2 { margin-top: 0; font-weight: 800; font-size: 24px; letter-spacing: -0.5px; color: #1e293b; }
    .login-box .sub { color: #64748b; font-size: 14px; margin-bottom: 24px; }
    .login-box .field { margin-bottom: 18px; text-align: left; }
    .login-box .field label { display: block; font-weight: 700; font-size: 13px; color: #334155; margin-bottom: 4px; }
    .login-box .field input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #d1d5db;
      border-radius: 14px;
      font-size: 15px;
      background: #f8fafc;
    }
    .login-box .field input:focus { border-color: #4f46e5; outline: 2px solid rgba(79,70,229,0.3); }
    .login-box .login-btn {
      width: 100%;
      padding: 14px;
      background: #4f46e5;
      color: #fff;
      border: 0;
      border-radius: 16px;

<script>
// ========== 登入控制 (三組管理者) ==========
const MANAGERS = [
  { username: 'admin', password: '1234' },
  { username: 'manager', password: 'manager' },
  { username: 'super', password: 'super' }
];

let isLoggedIn = false;

function handleLogin() {
  const user = document.getElementById('loginUser').value.trim();
  const pass = document.getElementById('loginPass').value.trim();
  const errorEl = document.getElementById('loginError');

  const valid = MANAGERS.some(m => m.username === user && m.password === pass);

  if (valid) {
    isLoggedIn = true;
    document.getElementById('loginOverlay').classList.add('hidden');
    document.getElementById('appContent').style.display = 'block';
    errorEl.classList.remove('show');
    if (typeof init === 'function') init();
    else {
      loadSettings();
      document.getElementById('output').innerHTML = '<div class="card">請輸入資料後，點擊「抓取並顯示」按鈕開始追蹤 FCN 合約。</div>';
    }
  } else {
    errorEl.classList.add('show');
    setTimeout(() => errorEl.classList.remove('show'), 4000);
  }
}

function logout() {
  if (confirm('確定要登出嗎？')) {
    isLoggedIn = false;
    document.getElementById('loginOverlay').classList.remove('hidden');
    document.getElementById('appContent').style.display = 'none';
    if (window.modalChart) { window.modalChart.destroy(); window.modalChart = null; }
  }
}

document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !isLoggedIn) {
    handleLogin();
  }
});

// ========== 工具函數 ==========
function formatNumber(num, decimals=2) {
  if (num === undefined || num === null || isNaN(num)) return '0';
  const fixed = Number(num).toFixed(decimals);
  const parts = fixed.split('.');
  const intPart = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ',');
  return parts[1] !== undefined ? `${intPart}.${parts[1]}` : intPart;
}
function formatCurrency(val){ return formatNumber(val, 2); }

// ========== API 設定 ==========
const PROXY_API_BASE = 'https://yfin-proxy.onrender.com/history/';
const STORAGE_KEY = 'client_group_stock_system_v3';

let modalChart = null, stockCache = [];
let clientSeq = 0, groupSeq = 0, stockSeq = 0;

async function fetchPriceRange(symbol, start, end) {
  const url = `${PROXY_API_BASE}${encodeURIComponent(symbol.trim().toUpperCase())}?start=${start}&end=${end}`;
  let response;
  try { response = await fetch(url); } catch(e) { throw new Error(`無法連線至 Proxy 伺服器`); }
  if (!response.ok) {
    if (response.status === 404) throw new Error(`找不到股票代號「${symbol}」`);
    if (response.status === 429) throw new Error(`請求次數過多 (429)，請稍候再試。`);
    throw new Error(`Proxy 伺服器錯誤 (HTTP ${response.status})`);
  }
  let rawJson;
  try { rawJson = await response.json(); } catch(e) { throw new Error('Proxy 回傳資料格式無效'); }
  const ticker = rawJson.ticker;
  if (!ticker || !rawJson.close || !rawJson.close[ticker]) {
    throw new Error(`缺少 ${symbol} 的收盤價`);
  }
  const closeData = rawJson.close[ticker];
  const sortedDates = Object.keys(closeData).sort();
  if (sortedDates.length === 0) return [];
  return sortedDates.map(dateStr => ({
    date: dateStr.split('T')[0],
    close: closeData[dateStr]
  }));
}

const delay = ms => new Promise(res => setTimeout(res, ms));
async function fetchStockName(symbol){ return symbol.trim().toUpperCase(); }

// ========== 客戶與群組 UI 生成 ==========
function buildClientHTML(clientId, seq, data={}) {
  const name = data.clientName || `客戶 ${seq}`;
  return `
    <div class="client-card" data-client-id="${clientId}">
      <div class="client-header" onclick="toggleClient('${clientId}')">
        <input class="client-name" value="${name}" placeholder="輸入客戶名稱" 
               onclick="event.stopPropagation()" 
               onchange="onClientNameChange(this)" 
               onfocus="this.select()">
        <div class="client-actions" onclick="event.stopPropagation();">
          <button onclick="addGroupToClient('${clientId}')"><i class="fa-solid fa-layer-group"></i> 群組</button>
          <button class="danger btn-delete-client" onclick="event.stopPropagation(); removeClient('${clientId}')"><i class="fa-solid fa-trash"></i></button>
          <button class="outline" onclick="event.stopPropagation(); expandClientGroups('${clientId}')"><i class="fa-solid fa-up-right-and-down-left-from-center"></i> 展開</button>
          <button class="outline" onclick="event.stopPropagation(); collapseClientGroups('${clientId}')"><i class="fa-solid fa-down-left-and-up-right-to-center"></i> 收合</button>
        </div>
      </div>
      <div class="client-body" id="clientBody_${clientId}">
        <div class="group-list" id="groupList_${clientId}"></div>
        <div class="group-actions">
          <button class="secondary" onclick="addGroupToClient('${clientId}')">＋ 新增群組 (子層)</button>
        </div>
        <div class="client-charts-section" id="clientCharts_${clientId}">
          <div class="charts-content" id="clientChartsContent_${clientId}"></div>
        </div>
      </div>
    </div>
  `;
}

function buildGroupHTML(groupId, clientId, seq, data={}) {
  const fcnDisplay = data.fcnAmount ? formatCurrency(data.fcnAmount) : '未設定';
  const aprDisplay = data.aprRate ? `${Number(data.aprRate).toFixed(1)}%` : '0%';
  const productId = data.productId || 'NO88888';
  return `
    <details class="group-card" data-group-id="${groupId}" data-client-id="${clientId}" data-product-id="${productId}" ${data.open !== false ? 'open' : ''}>
      <summary class="group-summary">
        <span>
          <span class="tag-product-id">📦 ${productId}</span>
          ${data.groupName || `群組 ${seq}`}
        </span>
        <span style="display:flex; gap:4px; flex-wrap:wrap; align-items:center;">
          <span class="tag-fcn">本金：${fcnDisplay}</span>
          <span class="tag-apr">Coupon：${aprDisplay}</span>
          <span class="tag-status ${data.status || 'normal'}">${data.status || 'Normal'}</span>
        </span>
      </summary>
      <div class="group-body">
        <div class="group-head">
          <div><label>產品編號</label><input type="text" class="group-product-id" placeholder="NO88888" value="${productId || ''}"></div>
          <div><label>群組名稱</label><input type="text" class="group-name" placeholder="群組名稱" value="${data.groupName || ''}"></div>
          <div><label>FCN 名義本金 (USD)</label><input type="number" step="1" class="group-fcn" placeholder="100000" value="${data.fcnAmount || ''}"></div>
          <div><label>年化配息率 (Coupon %)</label><input type="number" step="0.1" class="group-apr" placeholder="12" value="${data.aprRate || ''}"></div>
          <div>
            <button class="danger btn-delete-group" 
                    onclick="event.stopPropagation(); removeGroup('${groupId}')" 
                    style="min-height:36px;font-size:12px;width:100%;">
              <i class="fa-solid fa-trash"></i> 刪除
            </button>
          </div>
        </div>
        <div class="group-dates">
          <div class="group-date-toggle-container">
            <span class="group-date-toggle-label">📅 使用日期區間（合約期間）</span>
            <label class="switch"><input type="checkbox" class="group-use-dates"><span class="slider"></span></label>
          </div>
          <div class="grid">
            <div><label>起始日期</label><input type="date" class="group-start"></div>
            <div><label>結束日期</label><input type="date" class="group-end"></div>
          </div>
        </div>
        <div class="group-limits">
          <div><label>KO 提前出場 (%)</label><input type="number" step="0.1" class="group-ko" placeholder="105"></div>
          <div><label>KI 敲入價 (%)</label><input type="number" step="0.1" class="group-ki" placeholder="65"></div>
          <div><label>Strike 履約價 (%)</label><input type="number" step="0.1" class="group-strike" placeholder="75"></div>
          <div><label>年化配息率 (Coupon %)</label><input type="number" step="0.1" class="group-coupon" placeholder="12"></div>
          <div><label>年基準天數</label>
            <select class="group-daycount" style="width:100%;padding:10px;border-radius:12px;border:1px solid #d9deea;">
              <option value="365">365 天</option>
              <option value="360">360 天</option>
            </select>
          </div>
        </div>
        <div class="group-limits" style="grid-template-columns:1fr 1fr;">
          <div><label>初始價格 (留空則用購入價)</label><input type="number" step="0.01" class="group-initial-price" placeholder="自動使用購入價"></div>
          <div><label>最差標的 (Worst-of) 代碼</label><input type="text" class="group-worst" placeholder="例如 AAPL (留空自動判斷)"></div>
        </div>
        <div class="stock-list" id="stockList_${groupId}"></div>
        <div class="group-actions">
          <button class="secondary" onclick="addStockToGroup('${groupId}')">＋ 新增股票 (孫層)</button>
        </div>
      </div>
    </details>
  `;
}

// ========== 客戶操作 ==========
function onClientNameChange(input) {
  const clientCard = input.closest('.client-card');
  if (clientCard) saveSettings(false);
}

function addClient(data=null) {
  clientSeq++;
  const id = `client_${clientSeq}`;
  const container = document.getElementById('clientsContainer');
  const wrap = document.createElement('div');
  wrap.innerHTML = buildClientHTML(id, clientSeq, data || {});
  container.appendChild(wrap.firstElementChild);
  const clientEl = document.querySelector(`[data-client-id="${id}"]`);
  if (data?.groups) {
    data.groups.forEach(g => {
      const gData = { ...g, open: true };
      addGroupToClient(id, gData);
    });
  } else {
    addGroupToClient(id, { groupName: '預設群組', open: true });
  }
  saveSettings(false);
  return id;
}

function removeClient(clientId) {
  showConfirmDialog('確定要刪除這個客戶及其所有群組和股票嗎？', function() {
    document.querySelector(`[data-client-id="${clientId}"]`)?.remove();
    saveSettings(false);
  });
}

function toggleClient(clientId) {
  const body = document.getElementById(`clientBody_${clientId}`);
  if (body) body.style.display = body.style.display === 'none' ? '' : 'none';
}

function expandAllClients() {
  document.querySelectorAll('.client-body').forEach(el => el.style.display = '');
}

function collapseAllClients() {
  document.querySelectorAll('.client-body').forEach(el => el.style.display = 'none');
}

function expandClientGroups(clientId) {
    const clientEl = document.querySelector(`[data-client-id="${clientId}"]`);
    if (!clientEl) return;
    const body = document.getElementById(`clientBody_${clientId}`);
    if (body) body.style.display = '';
    clientEl.querySelectorAll('details.group-card').forEach(d => d.open = true);
    const content = document.getElementById(`clientChartsContent_${clientId}`);
    if (content) content.classList.remove('collapsed');
}

function collapseClientGroups(clientId) {
    const clientEl = document.querySelector(`[data-client-id="${clientId}"]`);
    if (!clientEl) return;
    clientEl.querySelectorAll('details.group-card').forEach(d => d.open = false);
    const content = document.getElementById(`clientChartsContent_${clientId}`);
    if (content) content.classList.add('collapsed');
}

// ========== 群組操作 ==========
function addGroupToClient(clientId, data=null) {
  groupSeq++;
  const gid = `group_${groupSeq}`;
  const clientEl = document.querySelector(`[data-client-id="${clientId}"]`);
  if (!clientEl) return;
  const list = document.getElementById(`groupList_${clientId}`);
  if (!list) return;
  const seq = list.querySelectorAll('.group-card').length + 1;
  const wrap = document.createElement('div');
  wrap.innerHTML = buildGroupHTML(gid, clientId, seq, data || {});
  list.appendChild(wrap.firstElementChild);
  const groupEl = document.querySelector(`[data-group-id="${gid}"]`);
  fillGroupValues(groupEl, data || {});
  bindGroupEvents(groupEl, seq);
  if (data?.stocks) {
    data.stocks.forEach(s => addStockToGroup(gid, s));
  } else {
    addStockToGroup(gid);
  }
  saveSettings(false);
  return gid;
}

function addGroupToSelectedClient() {
  let clientEl = document.querySelector('.client-card:last-child');
  if (!clientEl) {
    const cid = addClient({ clientName: '新客戶' });
    clientEl = document.querySelector(`[data-client-id="${cid}"]`);
  }
  if (clientEl) {
    const cid = clientEl.dataset.clientId;
    addGroupToClient(cid, { groupName: `群組 ${groupSeq+1}`, open: true });
  }
}

function removeGroup(groupId) {
  showConfirmDialog('確定要刪除這個群組及其所有股票嗎？', function() {
    const groupEl = document.querySelector(`[data-group-id="${groupId}"]`);
    if (groupEl) groupEl.remove();
    saveSettings(false);
  });
}

function fillGroupValues(el, data) {
  if (!el) return;
  el.querySelector('.group-product-id').value = data?.productId || 'NO88888';
  el.querySelector('.group-name').value = data?.groupName || '';
  el.querySelector('.group-fcn').value = data?.fcnAmount || '';
  el.querySelector('.group-apr').value = data?.aprRate || '';
  el.querySelector('.group-ko').value = data?.koValue ?? '105';
  el.querySelector('.group-ki').value = data?.kiValue ?? '65';
  el.querySelector('.group-strike').value = data?.strikeValue ?? '75';
  el.querySelector('.group-coupon').value = data?.couponRate ?? '12';
  el.querySelector('.group-daycount').value = data?.dayCount || '365';
  el.querySelector('.group-initial-price').value = data?.initialPrice || '';
  el.querySelector('.group-worst').value = data?.worstSymbol || '';
  el.querySelector('.group-use-dates').checked = !!data?.useDates;
  el.querySelector('.group-start').value = data?.start || '';
  el.querySelector('.group-end').value = data?.end || '';
  el.querySelector('.group-start').disabled = !data?.useDates;
  el.querySelector('.group-end').disabled = !data?.useDates;
}

function bindGroupEvents(el, seq) {
  if (!el) return;
  const productIdInput = el.querySelector('.group-product-id');
  const nameInput = el.querySelector('.group-name');
  const fcnInput = el.querySelector('.group-fcn');
  const aprInput = el.querySelector('.group-apr');
  const koInput = el.querySelector('.group-ko');
  const kiInput = el.querySelector('.group-ki');
  const strikeInput = el.querySelector('.group-strike');
  const couponInput = el.querySelector('.group-coupon');
  const daycountInput = el.querySelector('.group-daycount');
  const useDates = el.querySelector('.group-use-dates');
  const startInput = el.querySelector('.group-start');
  const endInput = el.querySelector('.group-end');

  const updateSummary = () => {
    const productId = productIdInput?.value.trim() || 'NO88888';
    const name = nameInput?.value.trim() || `群組 ${seq}`;
    const fcn = fcnInput?.value.trim() ? formatCurrency(Number(fcnInput.value)) : '未設定';
    const apr = aprInput?.value.trim() ? `${Number(aprInput.value).toFixed(1)}%` : '0%';
    const statusEl = el.querySelector('.tag-status');
    const status = statusEl ? statusEl.textContent : 'Normal';
    const summary = el.querySelector('.group-summary');
    if (summary) {
      summary.innerHTML = `
        <span>
          <span class="tag-product-id">📦 ${productId}</span>
          ${name}
        </span>
        <span style="display:flex; gap:4px; flex-wrap:wrap; align-items:center;">
          <span class="tag-fcn">本金：${fcn}</span>
          <span class="tag-apr">Coupon：${apr}</span>
          <span class="tag-status ${status.toLowerCase()}">${status}</span>
        </span>
      `;
    }
    // 更新 data-product-id 屬性以便查找
    el.dataset.productId = productId;
  };

  productIdInput?.addEventListener('input', updateSummary);
  nameInput?.addEventListener('input', updateSummary);
  fcnInput?.addEventListener('input', updateSummary);
  aprInput?.addEventListener('input', updateSummary);
  koInput?.addEventListener('input', () => saveSettings(false));
  kiInput?.addEventListener('input', () => saveSettings(false));
  strikeInput?.addEventListener('input', () => saveSettings(false));
  couponInput?.addEventListener('input', () => saveSettings(false));
  daycountInput?.addEventListener('change', () => saveSettings(false));
  useDates?.addEventListener('change', () => {
    const on = useDates.checked;
    if (startInput) startInput.disabled = !on;
    if (endInput) endInput.disabled = !on;
    saveSettings(false);
  });
  startInput?.addEventListener('change', () => saveSettings(false));
  endInput?.addEventListener('change', () => saveSettings(false));
  if (startInput) startInput.disabled = !useDates?.checked;
  if (endInput) endInput.disabled = !useDates?.checked;
  
  // 初始更新一次 summary
  setTimeout(updateSummary, 50);
}

// ========== 設定儲存與載入 ==========
function collectSettings() {
  const clients = [];
  document.querySelectorAll('.client-card').forEach(clientEl => {
    const clientId = clientEl.dataset.clientId;
    const clientName = clientEl.querySelector('.client-name')?.value?.trim() || '';
    const groups = [];
    clientEl.querySelectorAll('.group-card').forEach(groupEl => {
      const gid = groupEl.dataset.groupId;
      const productId = groupEl.querySelector('.group-product-id')?.value.trim() || 'NO88888';
      const groupName = groupEl.querySelector('.group-name')?.value.trim() || '';
      const fcnAmount = Number(groupEl.querySelector('.group-fcn')?.value) || 0;
      const aprRate = Number(groupEl.querySelector('.group-apr')?.value) || 0;
      const koValue = Number(groupEl.querySelector('.group-ko')?.value) || 105;
      const kiValue = Number(groupEl.querySelector('.group-ki')?.value) || 65;
      const strikeValue = Number(groupEl.querySelector('.group-strike')?.value) || 75;
      const couponRate = Number(groupEl.querySelector('.group-coupon')?.value) || 12;
      const dayCount = groupEl.querySelector('.group-daycount')?.value || '365';
      const initialPrice = Number(groupEl.querySelector('.group-initial-price')?.value) || 0;
      const worstSymbol = groupEl.querySelector('.group-worst')?.value.trim().toUpperCase() || '';
      const useDates = groupEl.querySelector('.group-use-dates')?.checked || false;
      const start = groupEl.querySelector('.group-start')?.value || '';
      const end = groupEl.querySelector('.group-end')?.value || '';
      const stocks = [];
      groupEl.querySelectorAll('.stock-row').forEach((row, idx) => {
        const code = row.querySelector('.stock-code')?.value.trim().toUpperCase();
        const buy = Number(row.querySelector('.stock-buy')?.value);
        const shares = Number(row.querySelector('.stock-shares')?.value) || 1;
        if (code && Number.isFinite(buy)) stocks.push({ code, buy, shares });
      });
      groups.push({ 
        groupId: gid, productId, groupName, fcnAmount, aprRate, 
        koValue, kiValue, strikeValue, couponRate, dayCount,
        initialPrice, worstSymbol,
        useDates, start, end, stocks 
      });
    });
    clients.push({ clientId, clientName, groups });
  });
  return { clients };
}

function saveSettings(showToast=true) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(collectSettings()));
  if (showToast) alert('已儲存');
}

function clearSettings() {
  if (!confirm('確定要清除所有設定嗎？')) return;
  localStorage.removeItem(STORAGE_KEY);
  document.getElementById('clientsContainer').innerHTML = '';
  clientSeq = 0; groupSeq = 0; stockSeq = 0;
  addClient({ clientName: '我的客戶' });
}

function loadSettings() {
  const raw = localStorage.getItem(STORAGE_KEY);
  if (!raw) { addClient({ clientName: '我的客戶' }); return; }
  try {
    const data = JSON.parse(raw);
    document.getElementById('clientsContainer').innerHTML = '';
    clientSeq = 0; groupSeq = 0; stockSeq = 0;
    if (data.clients && data.clients.length) {
      data.clients.forEach(c => {
        clientSeq++;
        const cid = `client_${clientSeq}`;
        const wrap = document.createElement('div');
        wrap.innerHTML = buildClientHTML(cid, clientSeq, c);
        document.getElementById('clientsContainer').appendChild(wrap.firstElementChild);
        const clientEl = document.querySelector(`[data-client-id="${cid}"]`);
        if (clientEl) {
          const body = document.getElementById(`clientBody_${cid}`);
          if (body) body.style.display = '';
          const list = document.getElementById(`groupList_${cid}`);
          if (list) {
            c.groups.forEach(g => {
              groupSeq++;
              const gid = `group_${groupSeq}`;
              const seq = list.querySelectorAll('.group-card').length + 1;
              const wrap2 = document.createElement('div');
              wrap2.innerHTML = buildGroupHTML(gid, cid, seq, g);
              list.appendChild(wrap2.firstElementChild);
              const groupEl = document.querySelector(`[data-group-id="${gid}"]`);
              fillGroupValues(groupEl, g);
              bindGroupEvents(groupEl, seq);
              const stockList = document.getElementById(`stockList_${gid}`);
              if (stockList && g.stocks) {
                g.stocks.forEach(s => addStockToGroup(gid, s));
              }
            });
          }
        }
      });
    } else {
      addClient({ clientName: '我的客戶' });
    }
  } catch(e) { addClient({ clientName: '我的客戶' }); }
}

// ========== FCN 合約計算核心邏輯 ==========
function calculateFCNContract(groupData, stockResults) {
  const { 
    fcnAmount, couponRate, koValue, kiValue, strikeValue, 
    start, end, dayCount, initialPrice: groupInitialPrice, worstSymbol,
    stocks 
  } = groupData;
  
  if (!fcnAmount || !couponRate || !start || !end) {
    return { status: 'Normal', details: '缺少必要參數', koTriggered: false, kiTriggered: false, months: 0, totalCoupon: 0, shares: 0, finalValue: 0 };
  }

  const startDate = new Date(start);
  const endDate = new Date(end);
  const daysDiff = Math.max(0, Math.floor((endDate - startDate) / (1000 * 60 * 60 * 24)));
  const totalMonths = Math.max(1, Math.floor(daysDiff / 30));
  
  const monthlyCoupon = fcnAmount * (couponRate / 100) * (30 / Number(dayCount));
  
  let worstStockCode = worstSymbol;
  if (!worstStockCode && stockResults.length > 0) {
    let maxLoss = Infinity;
    let worstCode = stockResults[0]?.code || '';
    for (const s of stockResults) {
      if (s.closes.length > 0 && s.buy > 0) {
        const lastClose = s.closes[s.closes.length - 1];
        const loss = (s.buy - lastClose) / s.buy;
        if (loss > maxLoss) {
          maxLoss = loss;
          worstCode = s.code;
        }
      }
    }
    worstStockCode = worstCode;
  }
  
  const worstResult = stockResults.find(s => s.code === worstStockCode);
  if (!worstResult) {
    return { status: 'Error', details: `找不到最差標的 ${worstStockCode}` };
  }

  const initialPrice = groupInitialPrice > 0 ? groupInitialPrice : worstResult.buy;
  
  const koPrice = initialPrice * (koValue / 100);
  const kiPrice = initialPrice * (kiValue / 100);
  const strikePrice = initialPrice * (strikeValue / 100);
  
  let koTriggered = false;
  let kiTriggered = false;
  let koDate = null;
  let kiDate = null;
  let triggeredMonth = totalMonths;
  
  const closes = worstResult.closes;
  const labels = worstResult.labels;
  
  for (let i = 0; i < closes.length; i++) {
    const price = closes[i];
    if (price >= koPrice) {
      koTriggered = true;
      koDate = labels[i];
      const d = new Date(labels[i]);
      const monthDiff = Math.floor((d - startDate) / (1000 * 60 * 60 * 24 * 30));
      triggeredMonth = Math.min(triggeredMonth, Math.max(1, monthDiff) + 1);
      break;
    }
    if (price < kiPrice) {
      kiTriggered = true;
      kiDate = labels[i];
    }
  }
  
  let status = 'Normal';
  let finalValue = fcnAmount;
  let shares = 0;
  let earnedMonths = 0;
  let totalCoupon = 0;
  let statusDetail = '';
  const lastClose = closes[closes.length - 1];
  
  let shareValue = 0;
  
  if (koTriggered) {
    status = 'KO';
    earnedMonths = Math.min(triggeredMonth, totalMonths);
    totalCoupon = monthlyCoupon * earnedMonths;
    finalValue = fcnAmount + totalCoupon;
    statusDetail = `✅ KO 提前出場 (${koDate})，拿回本金 ${formatCurrency(fcnAmount)} + 配息 ${formatCurrency(totalCoupon)}`;
  } else if (kiTriggered) {
    if (lastClose >= strikePrice) {
      status = 'Normal';
      earnedMonths = totalMonths;
      totalCoupon = monthlyCoupon * totalMonths;
      finalValue = fcnAmount + totalCoupon;
      statusDetail = `⚠️ KI 已觸發但到期價 (${formatCurrency(lastClose)}) ≥ Strike (${formatCurrency(strikePrice)})，拿回本金 ${formatCurrency(fcnAmount)} + 配息 ${formatCurrency(totalCoupon)}`;
    } else {
      status = 'Strike';
      earnedMonths = totalMonths;
      totalCoupon = monthlyCoupon * totalMonths;
      shares = fcnAmount / strikePrice;
      shareValue = lastClose * shares;
      finalValue = shareValue + totalCoupon;
      statusDetail = `🔄 KI 已觸發且到期價 (${formatCurrency(lastClose)}) < Strike (${formatCurrency(strikePrice)})，換股 ${shares.toFixed(4)} 股，價值 ${formatCurrency(shareValue)} + 配息 ${formatCurrency(totalCoupon)}`;
    }
  } else {
    status = 'Normal';
    earnedMonths = totalMonths;
    totalCoupon = monthlyCoupon * totalMonths;
    finalValue = fcnAmount + totalCoupon;
    statusDetail = `✅ 合約正常到期，拿回本金 ${formatCurrency(fcnAmount)} + 配息 ${formatCurrency(totalCoupon)}`;
  }
  
  const isStrikeScenario = (status === 'Strike');
  
  return {
    status: status,
    statusDetail: statusDetail,
    koTriggered: koTriggered,
    kiTriggered: kiTriggered,
    koDate: koDate,
    kiDate: kiDate,
    koPrice: koPrice,
    kiPrice: kiPrice,
    strikePrice: strikePrice,
    initialPrice: initialPrice,
    worstSymbol: worstStockCode,
    months: earnedMonths,
    totalMonths: totalMonths,
    triggeredMonth: triggeredMonth,
    monthlyCoupon: monthlyCoupon,
    totalCoupon: totalCoupon,
    shares: shares,
    shareValue: shareValue,
    finalValue: finalValue,
    lastClose: lastClose,
    fcnAmount: fcnAmount,
    couponRate: couponRate,
    labels: labels,
    closes: closes,
    isStrikeScenario: isStrikeScenario,
    monthlyData: Array.from({ length: totalMonths }, (_, i) => {
      const monthNum = i + 1;
      const isEarned = monthNum <= earnedMonths;
      const monthCoupon = isEarned ? monthlyCoupon : 0;
      let cumCoupon = 0;
      for (let j = 0; j <= i; j++) {
        if (j < earnedMonths) cumCoupon += monthlyCoupon;
      }
      let koCumReceipt = 0;
      if (koTriggered && monthNum >= triggeredMonth) {
        koCumReceipt = fcnAmount + cumCoupon;
      }
      
      let noKoCumReceipt = cumCoupon;
      if (isStrikeScenario) {
        if (monthNum === totalMonths) {
          noKoCumReceipt = shareValue + totalCoupon;
        } else {
          noKoCumReceipt = cumCoupon;
        }
      } else {
        if (monthNum === totalMonths && !koTriggered) {
          noKoCumReceipt = fcnAmount + totalCoupon;
        } else if (koTriggered && monthNum === triggeredMonth) {
          noKoCumReceipt = fcnAmount + cumCoupon;
        }
      }
      
      let kiCumCoupon = cumCoupon;
      
      return {
        month: monthNum,
        monthlyCoupon: monthCoupon,
        cumCoupon: cumCoupon,
        koCumReceipt: koCumReceipt,
        noKoCumReceipt: noKoCumReceipt,
        kiCumCoupon: kiCumCoupon,
        isAfterKO: koTriggered && monthNum > triggeredMonth
      };
    })
  };
}

// ========== CSV 導入導出 ==========
function exportCSV() {
    saveSettings(false);
    const settings = collectSettings();
    if (!settings.clients || settings.clients.length === 0) {
        alert('沒有資料可以導出。請先新增客戶與群組。');
        return;
    }
    
    const headers = [
        '客戶名稱',
        '產品編號',
        '群組名稱',
        '股票代碼',
        '購入價格',
        '股數',
        '本金 (FCN)',
        'Coupon (%)',
        '起始日期',
        '結束日期',
        'KO (%)',
        'KI (%)',
        'Strike (%)',
        '狀態'
    ];
    
    const rows = [];
    
    for (const client of settings.clients) {
        const clientName = client.clientName || '未命名';
        for (const group of client.groups) {
            const productId = group.productId || 'NO88888';
            const groupName = group.groupName || '未命名';
            if (group.stocks && group.stocks.length > 0) {
                for (const stock of group.stocks) {
                    rows.push([
                        clientName,
                        productId,
                        groupName,
                        stock.code || '',
                        stock.buy || 0,
                        stock.shares || 1,
                        group.fcnAmount || 0,
                        group.couponRate || group.aprRate || 0,
                        group.start || '',
                        group.end || '',
                        group.koValue || 105,
                        group.kiValue || 65,
                        group.strikeValue || 75,
                        group.status || 'Normal'
                    ]);
                }
            } else {
                rows.push([
                    clientName,
                    productId,
                    groupName,
                    '',
                    '',
                    '',
                    group.fcnAmount || 0,
                    group.couponRate || group.aprRate || 0,
                    group.start || '',
                    group.end || '',
                    group.koValue || 105,
                    group.kiValue || 65,
                    group.strikeValue || 75,
                    group.status || 'Normal'
                ]);
            }
        }
    }
    
    let csvContent = headers.join(',') + '\n';
    
    for (const row of rows) {
        const escapedRow = row.map(cell => {
            if (typeof cell === 'string' && (cell.includes(',') || cell.includes('"') || cell.includes('\n'))) {
                return `"${cell.replace(/"/g, '""')}"`;
            }
            return cell;
        });
        csvContent += escapedRow.join(',') + '\n';
    }
    
    const BOM = '\uFEFF';
    const blob = new Blob([BOM + csvContent], { type: 'text/csv;charset=utf-8;' });
    
    const link = document.createElement('a');
    const url = URL.createObjectURL(blob);
    link.setAttribute('href', url);
    link.setAttribute('download', `FCN_設定資料_${new Date().toISOString().slice(0,10)}.csv`);
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    URL.revokeObjectURL(url);
}

function importCSV(event) {
    const file = event.target.files[0];
    if (!file) return;
    
    const reader = new FileReader();
    reader.onload = function(e) {
        try {
            const csvText = e.target.result;
            const cleanText = csvText.replace(/^\uFEFF/, '');
            const lines = cleanText.split('\n').filter(line => line.trim() !== '');
            
            if (lines.length < 2) {
                alert('CSV 檔案格式錯誤：沒有資料列。');
                return;
            }
            
            const headerLine = lines[0];
            const headers = parseCSVLine(headerLine);
            
            const requiredFields = ['客戶名稱', '產品編號', '群組名稱', '股票代碼', '購入價格', '股數', '本金 (FCN)', 'Coupon (%)', '起始日期', '結束日期', 'KO (%)', 'KI (%)', 'Strike (%)'];
            const missingFields = requiredFields.filter(f => !headers.includes(f));
            if (missingFields.length > 0) {
                alert(`CSV 檔案缺少必要欄位：${missingFields.join(', ')}`);
                return;
            }
            
            const idxClient = headers.indexOf('客戶名稱');
            const idxProduct = headers.indexOf('產品編號');
            const idxGroup = headers.indexOf('群組名稱');
            const idxCode = headers.indexOf('股票代碼');
            const idxBuy = headers.indexOf('購入價格');
            const idxShares = headers.indexOf('股數');
            const idxFcn = headers.indexOf('本金 (FCN)');
            const idxCoupon = headers.indexOf('Coupon (%)');
            const idxStart = headers.indexOf('起始日期');
            const idxEnd = headers.indexOf('結束日期');
            const idxKO = headers.indexOf('KO (%)');
            const idxKI = headers.indexOf('KI (%)');
            const idxStrike = headers.indexOf('Strike (%)');
            const idxStatus = headers.indexOf('狀態');
            
            const dataRows = [];
            for (let i = 1; i < lines.length; i++) {
                const values = parseCSVLine(lines[i]);
                if (values.length === 0) continue;
                while (values.length < headers.length) {
                    values.push('');
                }
                dataRows.push(values);
            }
            
            if (dataRows.length === 0) {
                alert('CSV 檔案沒有有效資料。');
                return;
            }
            
            const existingData = collectSettings();
            if (existingData.clients && existingData.clients.length > 0) {
                if (!confirm('導入 CSV 將會覆蓋目前所有的客戶、群組與股票資料。確定要繼續嗎？')) {
                    return;
                }
            }
            
            const newClients = [];
            const clientMap = {};
            
            for (const row of dataRows) {
                const clientName = row[idxClient]?.trim() || '未命名客戶';
                const productId = row[idxProduct]?.trim() || 'NO88888';
                const groupName = row[idxGroup]?.trim() || '未命名群組';
                const code = row[idxCode]?.trim().toUpperCase() || '';
                const buy = parseFloat(row[idxBuy]) || 0;
                const shares = parseInt(row[idxShares]) || 1;
                const fcnAmount = parseFloat(row[idxFcn]) || 0;
                const couponRate = parseFloat(row[idxCoupon]) || 0;
                const start = row[idxStart]?.trim() || '';
                const end = row[idxEnd]?.trim() || '';
                const koValue = parseFloat(row[idxKO]) || 105;
                const kiValue = parseFloat(row[idxKI]) || 65;
                const strikeValue = parseFloat(row[idxStrike]) || 75;
                const status = row[idxStatus]?.trim() || 'Normal';
                
                const key = `${clientName}|${productId}|${groupName}`;
                if (!clientMap[clientName]) {
                    clientMap[clientName] = {
                        clientId: `client_${Object.keys(clientMap).length + 1}`,
                        clientName: clientName,
                        groups: {}
                    };
                }
                
                if (!clientMap[clientName].groups[key]) {
                    clientMap[clientName].groups[key] = {
                        productId: productId,
                        groupName: groupName,
                        fcnAmount: fcnAmount,
                        aprRate: couponRate,
                        couponRate: couponRate,
                        koValue: koValue,
                        kiValue: kiValue,
                        strikeValue: strikeValue,
                        useDates: !!(start && end),
                        start: start,
                        end: end,
                        status: status,
                        stocks: []
                    };
                } else {
                    const g = clientMap[clientName].groups[key];
                    if (fcnAmount) g.fcnAmount = fcnAmount;
                    if (couponRate) { g.couponRate = couponRate; g.aprRate = couponRate; }
                    if (koValue) g.koValue = koValue;
                    if (kiValue) g.kiValue = kiValue;
                    if (strikeValue) g.strikeValue = strikeValue;
                    if (start && end) { g.useDates = true; g.start = start; g.end = end; }
                    if (status) g.status = status;
                }
                
                if (code) {
                    clientMap[clientName].groups[key].stocks.push({
                        code: code,
                        buy: buy,
                        shares: shares
                    });
                }
            }
            
            for (const [clientName, clientData] of Object.entries(clientMap)) {
                const groups = Object.values(clientData.groups);
                newClients.push({
                    clientId: clientData.clientId,
                    clientName: clientName,
                    groups: groups.map(g => ({
                        groupId: `group_${Math.random().toString(36).substr(2, 6)}`,
                        productId: g.productId,
                        groupName: g.groupName,
                        fcnAmount: g.fcnAmount,
                        aprRate: g.aprRate,
                        koValue: g.koValue,
                        kiValue: g.kiValue,
                        strikeValue: g.strikeValue,
                        couponRate: g.couponRate,
                        dayCount: '365',
                        initialPrice: 0,
                        worstSymbol: '',
                        useDates: g.useDates,
                        start: g.start,
                        end: g.end,
                        stocks: g.stocks,
                        status: g.status
                    }))
                });
            }
            
            const settingsData = { clients: newClients };
            localStorage.setItem(STORAGE_KEY, JSON.stringify(settingsData));
            
            alert(`✅ 成功導入 ${dataRows.length} 筆資料，共 ${Object.keys(clientMap).length} 個客戶。`);
            
            document.getElementById('csvFileInput').value = '';
            
            loadSettings();
            document.getElementById('output').innerHTML = '<div class="card">✅ CSV 已導入完成！請點擊「抓取並顯示」按鈕更新數據。</div>';
            
        } catch(err) {
            alert('導入 CSV 失敗：' + err.message);
            console.error(err);
            document.getElementById('csvFileInput').value = '';
        }
    };
    reader.readAsText(file, 'UTF-8');
}

function parseCSVLine(line) {
    const result = [];
    let current = '';
    let inQuotes = false;
    
    for (let i = 0; i < line.length; i++) {
        const char = line[i];
        if (char === '"') {
            if (inQuotes && line[i+1] === '"') {
                current += '"';
                i++;
            } else {
                inQuotes = !inQuotes;
            }
        } else if (char === ',' && !inQuotes) {
            result.push(current.trim());
            current = '';
        } else {
            current += char;
        }
    }
    result.push(current.trim());
    return result;
}

                </div>
              </div>
              
              ${c.monthlyData && c.monthlyData.length > 0 ? `
              <div class="coupon-chart-container">
                <div class="chart-title">📊 累積配息收益明細表（${g.groupName}）</div>
                <div style="overflow-x:auto;margin-top:6px;">
                  <table class="coupon-detail-table">
                    <thead>
                      <tr>
                        <th>月份</th>
                        <th>累積配息</th>
                        <th>KO 情境累積收款</th>
                        <th>無 KO 到期累積收款</th>
                        <th>KI 情境累積配息</th>
                      </tr>
                    </thead>
                    <tbody>
                      ${c.monthlyData.map(d => `
                        <tr class="${d.isAfterKO ? 'ko-ended' : ''}">
                          <td>第${d.month}月</td>
                          <td>${d.isAfterKO ? '-' : formatCurrency(d.cumCoupon)}</td>
                          <td>${d.isAfterKO ? '-' : (d.koCumReceipt > 0 ? formatCurrency(d.koCumReceipt) : '-')}</td>
                          <td>${d.isAfterKO ? '-' : formatCurrency(d.noKoCumReceipt)}</td>
                          <td>${d.isAfterKO ? '-' : formatCurrency(d.kiCumCoupon)}</td>
                        </tr>
                      `).join('')}
                      <tr class="total-row">
                        <td><strong>合計</strong></td>
                        <td><strong>${formatCurrency(c.totalCoupon)}</strong></td>
                        <td><strong>${c.koTriggered ? formatCurrency(c.fcnAmount + c.totalCoupon) : '-'}</strong></td>
                        <td><strong>${c.isStrikeScenario ? formatCurrency(c.shareValue + c.totalCoupon) : formatCurrency(c.fcnAmount + c.totalCoupon)}</strong></td>
                        <td><strong>${formatCurrency(c.totalCoupon)}</strong></td>
                      </tr>
                    </tbody>
                  </table>
                </div>
                <div class="chart-wrap" style="height:280px;margin-top:8px;">
                  <canvas id="couponChart_${g.groupId}"></canvas>
                </div>
                <div style="font-size:11px;color:#6b7280;margin-top:4px;">
                  <span>● <span style="color:#10b981;">累積配息</span></span>
                  <span>● <span style="color:#3b82f6;">KO 情境累積收款</span></span>
                  <span>● <span style="color:#f59e0b;">無 KO 到期累積收款</span></span>
                  <span>● <span style="color:#ef4444;">KI 情境累積配息</span></span>
                  ${c.koTriggered ? `<span style="margin-left:8px;">⛔ KO 提前出場，之後月份不顯示</span>` : ''}
                  ${c.isStrikeScenario ? `<span style="margin-left:8px;">🔄 Strike 換股情境，黃線顯示換股價值</span>` : ''}
                </div>
              </div>
              ` : ''}
            </div>
          </div>
        `;

        if (c.months > 0 && c.totalCoupon > 0) {
          profitChartData.push({
            label: `${client} - ${g.groupName}`,
            months: c.months,
            total: c.finalValue,
            color: profitColors[colorIdx % profitColors.length],
            monthly: c.monthlyCoupon,
            status: g.status
          });
          colorIdx++;
        }
      }

      const totalFcn = fcnData.reduce((sum, d) => sum + d.value, 0);
      if (fcnData.length > 1) {
        const fcnColors = ['#4f46e5', '#f59e0b', '#ef4444', '#10b981', '#8b5cf6', '#ec4899', '#06b6d4', '#f97316', '#14b8a6'];
        const pieId = `fcnPie_${client.replace(/\s/g, '_')}`;
        html += `
          <div class="fcn-pie-card">
            <div style="display:flex;justify-content:space-between;align-items:center;cursor:pointer;" 
                 onclick="toggleChartContent('${pieId}')">
              <div class="pie-title">🥧 ${client} - FCN 名義本金佔比</div>
              <button class="secondary" style="padding:2px 8px;min-height:24px;font-size:11px;width:auto;" 
                      onclick="event.stopPropagation(); toggleChartContent('${pieId}')">
                <i class="fa-solid fa-chevron-down" id="chartIcon_${pieId}"></i>
              </button>
            </div>
            <div id="chartContent_${pieId}" style="display:block;">
              <div class="total-fcn">總投入本金：<strong>${formatCurrency(totalFcn)}</strong> USD</div>
              <div class="chart-wrap" style="height:260px;">
                <canvas id="${pieId}"></canvas>
              </div>
              <div style="margin-top:6px;display:flex;flex-wrap:wrap;gap:4px;font-size:12px;color:#4b5563;">
                ${fcnData.map((d, i) => `
                  <span style="display:inline-flex;align-items:center;gap:4px;margin-right:8px;">
                    <span style="display:inline-block;width:12px;height:12px;border-radius:3px;background:${fcnColors[i % fcnColors.length]};"></span>
                    ${d.label}：${formatCurrency(d.value)} (${d.status})
                  </span>
                `).join('')}
              </div>
            </div>
          </div>
        `;
      } else if (fcnData.length === 1) {
        const pieId = `fcnPie_${client.replace(/\s/g, '_')}`;
        html += `
          <div class="fcn-pie-card">
            <div style="display:flex;justify-content:space-between;align-items:center;cursor:pointer;" 
                 onclick="toggleChartContent('${pieId}')">
              <div class="pie-title">🥧 ${client} - FCN 名義本金</div>
              <button class="secondary" style="padding:2px 8px;min-height:24px;font-size:11px;width:auto;" 
                      onclick="event.stopPropagation(); toggleChartContent('${pieId}')">
                <i class="fa-solid fa-chevron-down" id="chartIcon_${pieId}"></i>
              </button>
            </div>
            <div id="chartContent_${pieId}" style="display:block;">
              <div class="total-fcn">總投入本金：<strong>${formatCurrency(totalFcn)}</strong> USD</div>
              <div style="padding:12px;background:#f3f4f6;border-radius:8px;text-align:center;color:#4b5563;font-size:14px;">
                ${fcnData[0].label}：${formatCurrency(fcnData[0].value)} (${fcnData[0].status})
              </div>
            </div>
          </div>
        `;
      }

      const totalFinalValue = finalValueData.reduce((sum, d) => sum + d.value, 0);
      if (finalValueData.length > 1) {
        const fvColors = ['#4f46e5', '#f59e0b', '#ef4444', '#10b981', '#8b5cf6', '#ec4899', '#06b6d4', '#f97316', '#14b8a6'];
        const pieId = `finalValuePie_${client.replace(/\s/g, '_')}`;
        html += `
          <div class="final-value-pie-card">
            <div style="display:flex;justify-content:space-between;align-items:center;cursor:pointer;" 
                 onclick="toggleChartContent('${pieId}')">
              <div class="pie-title">💰 ${client} - 最終價值總資產</div>
              <button class="secondary" style="padding:2px 8px;min-height:24px;font-size:11px;width:auto;" 
                      onclick="event.stopPropagation(); toggleChartContent('${pieId}')">
                <i class="fa-solid fa-chevron-down" id="chartIcon_${pieId}"></i>
              </button>
            </div>
            <div id="chartContent_${pieId}" style="display:block;">
              <div class="total-asset">總資產：<strong>${formatCurrency(totalFinalValue)}</strong> USD</div>
              <div class="chart-wrap" style="height:260px;">
                <canvas id="${pieId}"></canvas>
              </div>
              <div style="margin-top:6px;display:flex;flex-wrap:wrap;gap:4px;font-size:12px;color:#4b5563;">
                ${finalValueData.map((d, i) => `
                  <span style="display:inline-flex;align-items:center;gap:4px;margin-right:8px;">
                    <span style="display:inline-block;width:12px;height:12px;border-radius:3px;background:${fvColors[i % fvColors.length]};"></span>
                    ${d.label}：${formatCurrency(d.value)} (${d.status})
                  </span>
                `).join('')}
              </div>
            </div>
          </div>
        `;
      } else if (finalValueData.length === 1) {
        const pieId = `finalValuePie_${client.replace(/\s/g, '_')}`;
        html += `
          <div class="final-value-pie-card">
            <div style="display:flex;justify-content:space-between;align-items:center;cursor:pointer;" 
                 onclick="toggleChartContent('${pieId}')">
              <div class="pie-title">💰 ${client} - 最終價值總資產</div>
              <button class="secondary" style="padding:2px 8px;min-height:24px;font-size:11px;width:auto;" 
                      onclick="event.stopPropagation(); toggleChartContent('${pieId}')">
                <i class="fa-solid fa-chevron-down" id="chartIcon_${pieId}"></i>
              </button>
            </div>
            <div id="chartContent_${pieId}" style="display:block;">
              <div style="padding:12px;background:#f3f4f6;border-radius:8px;text-align:center;color:#4b5563;font-size:14px;">
                ${finalValueData[0].label}：${formatCurrency(finalValueData[0].value)} (${finalValueData[0].status})
              </div>
            </div>
          </div>
        `;
      }

      html += `</div>`;
      html += `</div>`;
    }

    if (profitChartData.length > 0) {
      html += `
        <div class="card">
          <div class="section-title">📊 各群組最終價值比較</div>
          <div class="small" style="margin-bottom:8px;">顯示各群組的最終價值（本金 + 配息，或換股價值 + 配息）</div>
          <div class="chart-wrap" style="height:320px;">
            <canvas id="profitStackChart"></canvas>
          </div>
        </div>
      `;
    }

    output.innerHTML = html;

    if (profitChartData.length > 0) {
      setTimeout(() => {
        const ctx = document.getElementById('profitStackChart')?.getContext('2d');
        if (!ctx) return;
        const labels = profitChartData.map(d => d.label);
        const totalValues = profitChartData.map(d => d.total);

        new Chart(ctx, {
          type: 'bar',
          data: {
            labels: labels,
            datasets: [{
              label: '最終價值 (USD)',
              data: totalValues,
              backgroundColor: profitChartData.map(d => d.color),
              borderRadius: 6,
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: { display: false },
              tooltip: {
                callbacks: {
                  label: function(context) {
                    const idx = context.dataIndex;
                    const d = profitChartData[idx];
                    return [
                      `最終價值：${formatCurrency(d.total)} USD`,
                      `累積月數：${d.months} 個月`,
                      `每月配息：${formatCurrency(d.monthly)} USD`,
                      `狀態：${d.status}`
                    ];
                  }
                }
              }
            },
            scales: {
              y: {
                beginAtZero: true,
                ticks: { callback: v => formatCurrency(v) }
              }
            }
          }
        });
      }, 300);
    }

    setTimeout(() => {
      const fvColors = ['#4f46e5', '#f59e0b', '#ef4444', '#10b981', '#8b5cf6', '#ec4899', '#06b6d4', '#f97316', '#14b8a6'];
      for (const [client, groups] of Object.entries(clientGroups)) {
        const finalValueData = groups.map(g => ({
          label: g.groupName,
          value: g.contract.finalValue,
          status: g.status
        }));
        if (finalValueData.length > 1) {
          const pieId = `finalValuePie_${client.replace(/\s/g, '_')}`;
          const ctx = document.getElementById(pieId)?.getContext('2d');
          if (!ctx) continue;
          const total = finalValueData.reduce((a, b) => a + b.value, 0);
          new Chart(ctx, {
            type: 'pie',
            data: {
              labels: finalValueData.map(d => `${d.label} (${d.status})`),
              datasets: [{
                data: finalValueData.map(d => d.value),
                backgroundColor: finalValueData.map((_, i) => fvColors[i % fvColors.length]),
                borderWidth: 2,
                borderColor: '#fff',
              }]
            },
            options: {
              responsive: true,
              maintainAspectRatio: false,
              plugins: {
                legend: { position: 'right', labels: { font: { size: 11 }, padding: 8, boxWidth: 14 } },
                tooltip: {
                  callbacks: {
                    label: function(context) {
                      const percentage = ((context.parsed / total) * 100).toFixed(1);
                      return `${context.label}：${formatCurrency(context.parsed)} (${percentage}%)`;
                    }
                  }
                }
              }
            }
          });
        }
      }
    }, 400);

    setTimeout(() => {
      const fcnColors = ['#4f46e5', '#f59e0b', '#ef4444', '#10b981', '#8b5cf6', '#ec4899', '#06b6d4', '#f97316', '#14b8a6'];
      for (const [client, groups] of Object.entries(clientGroups)) {
        const fcnData = groups.map(g => ({
          label: g.groupName,
          value: g.fcnAmount,
          status: g.status
        }));
        if (fcnData.length > 1) {
          const pieId = `fcnPie_${client.replace(/\s/g, '_')}`;
          const ctx = document.getElementById(pieId)?.getContext('2d');
          if (!ctx) continue;
          const total = fcnData.reduce((a, b) => a + b.value, 0);
          new Chart(ctx, {
            type: 'pie',
            data: {
              labels: fcnData.map(d => `${d.label} (${d.status})`),
              datasets: [{
                data: fcnData.map(d => d.value),
                backgroundColor: fcnData.map((_, i) => fcnColors[i % fcnColors.length]),
                borderWidth: 2,
                borderColor: '#fff',
              }]
            },
            options: {
              responsive: true,
              maintainAspectRatio: false,
              plugins: {
                legend: { position: 'right', labels: { font: { size: 11 }, padding: 8, boxWidth: 14 } },
                tooltip: {
                  callbacks: {
                    label: function(context) {
                      const percentage = ((context.parsed / total) * 100).toFixed(1);
                      return `${context.label}：${formatCurrency(context.parsed)} (${percentage}%)`;
                    }
                  }
                }
              }
            }
          });
        }
      }
    }, 500);

    setTimeout(() => {
      for (const [client, groups] of Object.entries(clientGroups)) {
        for (const g of groups) {
          const c = g.contract;
          if (c.monthlyData && c.monthlyData.length > 0) {
            const canvasId = `couponChart_${g.groupId}`;
            drawCouponDetailChart(canvasId, c.monthlyData, c.fcnAmount, c.totalMonths, c.status);
          }
        }
      }
    }, 600);

    document.querySelectorAll('.stock-card').forEach(el => {
      el.addEventListener('click', () => {
        const sid = el.dataset.stockid;
        const stock = stockCache.find(s => s.stockId === sid);
        if (stock) openModal(stock); 
      });
    });

  } catch(e) {
    output.innerHTML = `<div class="card" style="color:red;font-weight:bold;">❌ 抓取失敗：${e.message}</div>`;
  }
  toggleAllContent('collapse');
}

// ========== 圖表 Modal ==========
function drawModalChart(stock) {
  const ctx = document.getElementById('modalChart').getContext('2d');
  if (modalChart) modalChart.destroy();
  const groupEl = document.querySelector(`[data-group-id="${stock.groupId}"]`);
  let koPct = 105, kiPct = 65, strikePct = 75;
  if (groupEl) {
    koPct = Number(groupEl.querySelector('.group-ko')?.value) || 105;
    kiPct = Number(groupEl.querySelector('.group-ki')?.value) || 65;
    strikePct = Number(groupEl.querySelector('.group-strike')?.value) || 75;
  }
  const koPrice = stock.buy * (koPct / 100);
  const strikePrice = stock.buy * (strikePct / 100);
  const kiPrice = stock.buy * (kiPct / 100);
  modalChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: stock.labels,
      datasets: [
        { label: '收盤價', data: stock.closes, borderColor: '#4f46e5', tension: .25, pointRadius: 2, borderWidth: 2 },
        { label: `KO (${koPct}%)`, data: stock.labels.map(() => koPrice), borderColor: '#3b82f6', borderDash: [4,4], pointRadius: 0, borderWidth: 2 },
        { label: `Strike (${strikePct}%)`, data: stock.labels.map(() => strikePrice), borderColor: '#f59e0b', borderDash: [4,4], pointRadius: 0, borderWidth: 2 },
        { label: `KI (${kiPct}%)`, data: stock.labels.map(() => kiPrice), borderColor: '#ef4444', borderDash: [4,4], pointRadius: 0, borderWidth: 2 }
      ]
    },
    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'top' } } }
  });
}

function openModal(stock) {
  document.getElementById('modalTitle').textContent = `${stock.code} / ${stock.name}`;
  document.getElementById('modalInfo').textContent =
    `群組：${stock.group}｜購入價：${formatCurrency(stock.buy)}｜最新價：${stock.closeText}`;
  document.getElementById('chartModal').classList.add('show');
  setTimeout(() => drawModalChart(stock), 0);
}

function closeModal(event) {
  if (event && event.target !== event.currentTarget) return;
  document.getElementById('chartModal').classList.remove('show');
  if (modalChart) { modalChart.destroy(); modalChart = null; }
}

// ========== 初始化 ==========
function init() {
  loadSettings();
  document.getElementById('output').innerHTML = '<div class="card">請輸入資料後，點擊「抓取並顯示」按鈕開始追蹤 FCN 合約。</div>';
}

if (isLoggedIn) {
  init();
}
</script>
</body>
