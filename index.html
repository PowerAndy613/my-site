<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>美股追蹤（透過後端 yfinance）</title>

  <!-- Chart.js (鎖版) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>

  <style>
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",sans-serif;padding:12px;background:#f6f7fb;color:#111}
    .card{background:#fff;border-radius:12px;padding:12px;margin-bottom:12px;box-shadow:0 2px 10px rgba(0,0,0,.06)}
    label{display:block;font-size:13px;margin-top:8px}
    input,button,select{width:100%;box-sizing:border-box;padding:8px;border-radius:8px;border:1px solid #d9deea;background:#fff}
    button{background:#4f46e5;color:#fff;border:0;font-weight:800;cursor:pointer}
    #status{margin-top:8px;color:#444}
    #output{white-space:pre-wrap;background:#f6f8fa;padding:8px;border-radius:8px;margin-top:8px;min-height:40px}
    canvas{max-width:100%}
    .muted{color:#6b7280;font-size:13px}
    .controls{display:flex;gap:8px;margin-top:10px}
    .controls button{flex:1}
  </style>
</head>
<body>
  <h1>美股追蹤（後端 yfinance 範例）</h1>

  <div class="card">
    <div style="font-weight:800;margin-bottom:6px">說明（重要）</div>
    <div class="muted">
      - 本頁面改用後端 API 取得歷史股價；請先部署後端（FastAPI）並把後端 URL 填入下方 <code>backendBase</code>。<br>
      - 後端應提供 /history/{ticker}?start=YYYY-MM-DD&end=YYYY-MM-DD 回傳 JSON: {"data":[{"date":"YYYY-MM-DD","close":123.45}, ...]}。<br>
      - 如遇 CORS，請確認後端 ALLOWED_ORIGINS 包含此網域。
    </div>
  </div>

  <div class="card">
    <label for="ticker">股票代號（例如 AAPL）</label>
    <input id="ticker" value="AAPL" />

    <label for="start">起始日期</label>
    <input id="start" type="date" value="" />

    <label for="end">結束日期</label>
    <input id="end" type="date" value="" />

    <div class="controls">
      <button id="fetchPy">抓取並顯示</button>
      <button id="clearOutput" style="background:#6b7280">清除輸出</button>
    </div>

    <div id="status">狀態：尚未請求。</div>
    <div id="output"></div>
  </div>

  <div class="card">
    <div style="font-weight:800;margin-bottom:6px">歷史收盤價圖</div>
    <div style="position:relative;height:320px">
      <canvas id="priceChart"></canvas>
    </div>
  </div>

  <script>
    // ====== CONFIG: 把這裡改成你的後端 URL（不要尾斜線） ======
    const backendBase = 'https://YOUR_BACKEND_DOMAIN'; // e.g. 'https://your-service.onrender.com'
    // =========================================================

    const statusEl = document.getElementById('status');
    const outputEl = document.getElementById('output');
    let priceChart = null;

    function drawChart(data){
      const ctx = document.getElementById('priceChart').getContext('2d');
      if(priceChart) priceChart.destroy();
      if(!data || data.length === 0){
        priceChart = new Chart(ctx, { type:'line', data:{labels:[], datasets:[]}, options:{} });
        return;
      }
      const labels = data.map(x => x.date);
      const values = data.map(x => x.close);
      priceChart = new Chart(ctx, {
        type:'line',
        data:{
          labels,
          datasets:[{
            label:'收盤價',
            data: values,
            borderColor: '#4f46e5',
            backgroundColor: 'rgba(79,70,229,0.08)',
            tension: 0.2,
            pointRadius: 2,
            borderWidth: 2
          }]
        },
        options:{
          responsive:true,
          maintainAspectRatio:false,
          plugins:{legend:{display:false}},
          scales:{ x:{ticks:{maxRotation:0,autoSkip:true}}, y:{beginAtZero:false} }
        }
      });
    }

    async function fetchFromBackend(ticker, start, end){
      if(!backendBase || backendBase.includes('YOUR_BACKEND_DOMAIN')){
        throw new Error('請先在 index.html 中設定 backendBase 為你的後端 URL。');
      }
      const url = `${backendBase}/history/${encodeURIComponent(ticker)}?start=${encodeURIComponent(start||'')}&end=${encodeURIComponent(end||'')}`;
      const res = await fetch(url, { method: 'GET' });
      if(!res.ok){
        const text = await res.text().catch(()=>'');
        throw new Error(`後端回應錯誤: ${res.status} ${text}`);
      }
      const json = await res.json();
      return json.data || [];
    }

    document.getElementById('fetchPy').addEventListener('click', async () => {
      const ticker = document.getElementById('ticker').value.trim().toUpperCase();
      const start = document.getElementById('start').value;
      const end = document.getElementById('end').value;
      if(!ticker){ alert('請輸入股票代號'); return; }
      outputEl.textContent = '';
      statusEl.textContent = '狀態：向後端請求資料中...';
      try{
        const data = await fetchFromBackend(ticker, start, end);
        if(!data || data.length === 0){
          outputEl.textContent = '未取得資料（請檢查代號或日期範圍）';
          drawChart([]);
          statusEl.textContent = '狀態：完成（無資料）';
          return;
        }
        outputEl.textContent = data.slice(-20).map(r=>`${r.date}  收盤：${r.close}`).join('\n');
        drawChart(data);
        statusEl.textContent = '狀態：完成';
      }catch(err){
        console.error(err);
        statusEl.textContent = '狀態：請求失敗（檢查 Console 與 Network）';
        outputEl.textContent = err.toString();
      }
    });

    document.getElementById('clearOutput').addEventListener('click', () => {
      outputEl.textContent = '';
      if(priceChart){ priceChart.destroy(); priceChart = null; }
      statusEl.textContent = '狀態：已清除';
    });
  </script>
</body>
</html>
