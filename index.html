<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>美股群組卡片追蹤系統 (KO/Strike/KI 精簡顯示版)</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body{
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",sans-serif;
      margin:0;
      padding:10px;
      padding-bottom:92px;
      background:#f6f7fb;
      color:#111;
      -webkit-font-smoothing:antialiased;
      text-rendering:optimizeLegibility
    }
    h1{font-size:20px;margin:0 0 10px;line-height:1.2}
    .card{
      background:#fff;
      border-radius:16px;
      box-shadow:0 2px 10px rgba(0,0,0,.06);
      padding:12px;
      margin-bottom:10px
    }
    .section-title{font-size:15px;font-weight:800;margin-bottom:8px}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    label{display:block;font-size:12px;color:#667085;margin-bottom:4px}
    input,button{
      width:100%;
      box-sizing:border-box;
      font-size:14px;
      border-radius:12px;
      border:1px solid #d9deea;
      padding:10px;
      background:#fff
    }
    button{
      background:#4f46e5;
      color:#fff;
      border:0;
      font-weight:800;
      cursor:pointer;
      min-height:42px
    }
    .secondary{background:#e5e7eb;color:#111}
    .danger{background:#ef4444;color:#fff}

    details.group-card{
      border:1px solid #e5e7eb;
      border-radius:16px;
      background:#fafbff;
      margin-bottom:10px;
      overflow:hidden
    }
    details.group-card[open]{box-shadow:0 2px 10px rgba(0,0,0,.06)}
    summary.group-summary{
      list-style:none;
      cursor:pointer;
      padding:12px;
      font-weight:900;
      font-size:16px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      background:#f8faff;
      border-bottom:1px solid #e5e7eb
    }
    summary.group-summary::-webkit-details-marker{display:none}
    summary.group-summary::after{
      content:"▾";
      font-size:14px;
      color:#667085;
      transition:transform .15s ease
    }
    details.group-card[open] summary.group-summary::after{transform:rotate(180deg)}
    .group-body{padding:10px 10px 12px}
    .group-head{
      display:grid;
      grid-template-columns:1fr 104px;
      gap:8px;
      align-items:end;
      margin-bottom:8px
    }
    .group-limits{
      display:grid;
      grid-template-columns:1fr 1fr 1fr;
      gap:8px;
      margin-bottom:8px
    }
    
    .group-dates{
      border:1px solid #e2e8f0;
      border-radius:14px;
      padding:12px;
      margin-bottom:12px;
      background:#fff;
      box-shadow:inset 0 1px 2px rgba(0,0,0,0.02);
    }
    .group-date-toggle-container {
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:10px;
      padding-bottom:8px;
      border-bottom:1px dashed #e2e8f0;
    }
    .group-date-toggle-label {
      font-size:13px;
      font-weight:800;
      color:#334155;
    }
    .switch {
      position:relative;
      display:inline-block;
      width:42px;
      height:24px;
    }
    .switch input {
      opacity:0;
      width:0;
      height:0;
    }
    .slider {
      position:absolute;
      cursor:pointer;
      top:0;left:0;right:0;bottom:0;
      background-color:#cbd5e1;
      transition:.3s;
      border-radius:24px;
    }
    .slider:before {
      position:absolute;
      content:"";
      height:18px;
      width:18px;
      left:3px;
      bottom:3px;
      background-color:white;
      transition:.3s;
      border-radius:50%;
    }
    input:checked + .slider {
      background-color:#4f46e5;
    }
    input:checked + .slider:before {
      transform:translateX(18px);
    }

    .stock-row{
      display:grid;
      grid-template-columns:1fr 1fr .9fr 72px;
      gap:6px;
      margin-top:6px;
      align-items:end
    }
    .stock-row button{background:#ef4444;padding:10px 6px}
    .group-actions{
      display:flex;
      gap:6px;
      margin-top:8px;
      flex-wrap:wrap
    }
    .group-actions button{
      flex:1 1 140px;
      min-height:42px
    }
    .stocks{
      display:grid;
      grid-template-columns:repeat(2, minmax(0, 1fr));
      gap:8px
    }
    .stock-card{
      background:linear-gradient(180deg,#ffffff 0%,#fbfbff 100%);
      border-radius:14px;
      padding:10px;
      border:2px solid #d8deea;
      box-shadow:0 1px 4px rgba(0,0,0,.04);
      min-height:106px;
      display:flex;
      flex-direction:column;
      justify-content:center;
      cursor:pointer;
      user-select:none
    }
    .stock-card.ko{border:4px solid #3b82f6;background:#eff6ff;font-weight:800} 
    .stock-card.ki{border:4px solid #ef4444;background:#fef2f2;font-weight:800} 
    .stock-card.strike{border:4px solid #f59e0b;background:#fffbeb;font-weight:800} 
    .stock-card.normal{border:4px solid #10b981;background:#f0fdf4;font-weight:800} 
    
    .status-badge {
      display:inline-block;
      padding:2px 8px;
      border-radius:8px;
      font-size:11px;
      font-weight:900;
      color:#fff;
      width:max-content;
      margin-top:4px
    }
    .status-badge.ko{background:#3b82f6}
    .status-badge.ki{background:#ef4444}
    .status-badge.strike{background:#f59e0b}
    .status-badge.normal{background:#10b981}

    .line1{font-size:15px;font-weight:900;line-height:1.2;word-break:break-all}
    .line2{font-size:13px;margin-top:3px;line-height:1.2;color:#1f2937}
    .line-pct{font-size:14px;margin-top:6px;line-height:1.2;font-weight:900}
    .stock-card.ko .line-pct {color:#2563eb}
    .stock-card.ki .line-pct {color:#dc2626}
    .stock-card.strike .line-pct {color:#d97706}
    .stock-card.normal .line-pct {color:#059669}
    
    .small{color:#6b7280;font-size:12px;margin-top:6px;line-height:1.4}

    .modal{
      display:none;
      position:fixed;
      inset:0;
      z-index:9999;
      background:rgba(0,0,0,.45);
      padding:12px;
      box-sizing:border-box
    }
    .modal.show{display:block}
    .modal-dialog{
      max-width:980px;
      margin:4vh auto;
      background:#fff;
      border-radius:18px;
      overflow:hidden;
      box-shadow:0 10px 30px rgba(0,0,0,.2)
    }
    .modal-header{
      padding:14px 16px;
      background:#f8f9fc;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px
    }
    .modal-title{font-size:18px;font-weight:800}
    .modal-body{padding:14px}
    .modal-close{
      width:auto;
      background:#111;
      color:#fff;
      border:0;
      padding:9px 12px;
      border-radius:12px
    }
    .chart-wrap{height:300px}
    .info-line{font-size:14px;color:#444;margin-bottom:10px;line-height:1.5}
    .mobile-bottom-nav{display:none}

    @media (max-width:760px){
      body{padding-bottom:84px}
      .grid,.group-limits{grid-template-columns:1fr}
      .group-head{grid-template-columns:1fr}
      .stock-row{grid-template-columns:1fr 1fr .9fr 72px}
      .mobile-bottom-nav{
        display:flex;
        position:fixed;
        left:0;
        right:0;
        bottom:0;
        z-index:10000;
        background:#fff;
        border-top:1px solid #e5e7eb;
        box-shadow:0 -4px 16px rgba(0,0,0,.08);
        padding:8px 10px calc(8px + env(safe-area-inset-bottom));
        gap:6px
      }
      .mobile-bottom-nav button{
        flex:1;
        min-height:48px;
        padding:8px 4px;
        border-radius:14px;
        border:1px solid #d9deea;
        background:#f9fafb;
        color:#111;
        display:flex;
        flex-direction:column;
        align-items:center;
        justify-content:center;
        gap:2px;
        font-size:11px;
        font-weight:800;
        line-height:1
      }
      .mobile-bottom-nav .nav-icon{font-size:18px;line-height:1}
      .mobile-bottom-nav .nav-text{font-size:11px;line-height:1}
      .stocks{grid-template-columns:repeat(2, minmax(0, 1fr))}
    }
    @media (min-width:760px){
      body{padding:14px;padding-bottom:14px}
      .stocks{grid-template-columns:repeat(auto-fill,minmax(220px,1fr))}
      .stock-card{min-height:102px;padding:14px}
      .line1{font-size:18px}
      .line2{font-size:15px;margin-top:6px}
      .line-pct{font-size:16px;margin-top:6px}
      .chart-wrap{height:360px}
    }
  </style>
</head>
<body>

<h1>美股群組卡片追蹤系統 (精簡百分比智慧判定)</h1>

<div class="card">
  <div class="section-title">Tiingo API 設定</div>
  <div>
    <label>API Token (金鑰)</label>
    <input type="password" id="tiingoToken" placeholder="請貼上您的 Tiingo API Token" oninput="saveSettings(false)">
  </div>
</div>

<div class="card">
  <div class="section-title">群組設定</div>
  <div class="group-actions">
    <button class="secondary" onclick="expandAllGroups()">展開全部</button>
    <button class="secondary" onclick="collapseAllGroups()">收合全部</button>
  </div>
  <div style="height:8px;"></div>
  <div id="groups"></div>
  <div class="group-actions">
    <button class="secondary" onclick="addGroup()">＋ 新增群組</button>
    <button onclick="loadAll()">抓取並顯示</button>
  </div>
  <div class="group-actions">
    <button class="secondary" onclick="saveSettings()">儲存設定</button>
    <button class="danger" onclick="clearSettings()">清除設定</button>
  </div>
  <div class="small"><b>條件說明：</b>系統會以股票的「購入價格」與區間內的歷史走勢、最新價判定群組狀態。格式精簡顯示為 <b>KO : 130%</b>, <b>KI : 60%</b> 或 <b>Strike : 98%</b>。</div>
</div>

<div id="output"></div>

<div class="card">
  <div class="section-title">目前資產圓餅圖</div>
  <div class="small" id="pieInfo">根據目前最新收盤價與股數計算。</div>
  <div class="chart-wrap">
    <canvas id="assetPie"></canvas>
  </div>
</div>

<div id="chartModal" class="modal" onclick="closeModal(event)">
  <div class="modal-dialog" onclick="event.stopPropagation()">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">股票圖表</div>
      <button class="modal-close" onclick="closeModal()">關閉</button>
    </div>
    <div class="modal-body">
      <div class="info-line" id="modalInfo"></div>
      <div class="chart-wrap">
        <canvas id="modalChart"></canvas>
      </div>
    </div>
  </div>
</div>

<div id="pieModal" class="modal" onclick="closePieModal(event)">
  <div class="modal-dialog" onclick="event.stopPropagation()">
    <div class="modal-header">
      <div class="modal-title" id="pieModalTitle">目前資產細節</div>
      <button class="modal-close" onclick="closePieModal()">關閉</button>
    </div>
    <div class="modal-body">
      <div class="info-line" id="pieModalInfo"></div>
      <div class="chart-wrap" style="height:420px;">
        <canvas id="pieModalChart"></canvas>
      </div>
    </div>
  </div>
</div>

<nav class="mobile-bottom-nav">
  <button onclick="expandAllGroups()">
    <span class="nav-icon"><i class="fa-solid fa-up-right-and-down-left-from-center"></i></span>
    <span class="nav-text">展開</span>
  </button>
  <button onclick="collapseAllGroups()">
    <span class="nav-icon"><i class="fa-solid fa-down-left-and-up-right-to-center"></i></span>
    <span class="nav-text">收合</span>
  </button>
  <button onclick="addGroup()">
    <span class="nav-icon"><i class="fa-solid fa-plus"></i></span>
    <span class="nav-text">群組</span>
  </button>
  <button onclick="loadAll()">
    <span class="nav-icon"><i class="fa-solid fa-arrows-rotate"></i></span>
    <span class="nav-text">顯示</span>
  </button>
  <button onclick="saveSettings()">
    <span class="nav-icon"><i class="fa-solid fa-floppy-disk"></i></span>
    <span class="nav-text">儲存</span>
  </button>
  <button onclick="clearSettings()">
    <span class="nav-icon"><i class="fa-solid fa-trash"></i></span>
    <span class="nav-text">清除</span>
  </button>
</nav>

<script>
const STORAGE_KEY='us_pct_structured_settings_v4';
let modalChart=null,pieChart=null,pieModalChart=null,stockCache=[],groupSeq=0,stockSeq=0,nameMap={},pieDataCache=[];

const delay = ms => new Promise(res => setTimeout(res, ms));

async function fetchTiingoRange(symbol, start, end, token){
  if(!token) throw new Error('請先填寫 Tiingo API Token 金鑰');
  const url = `https://api.tiingo.com/tiingo/daily/${encodeURIComponent(symbol.toLowerCase().trim())}/prices?startDate=${start}&endDate=${end}&token=${token}`;
  let res;
  try { res = await fetch(url); } catch(e) { throw new Error('網路連線失敗，無法連接至 Tiingo API'); }
  if(!res.ok) {
    if(res.status === 404) throw new Error(`404`);
    if(res.status === 429) throw new Error(`429 請求次數過多。請稍候一分鐘，讓 Tiingo 伺服器冷卻後再試。`);
    if(res.status === 401 || res.status === 403) throw new Error(`Tiingo 金鑰無效或無權限 (錯誤碼: ${res.status})`);
    throw new Error(`Tiingo 伺服器錯誤 (錯誤碼: ${res.status})`);
  }
  const json = await res.json();
  if(!Array.isArray(json) || json.length === 0) return [];
  return json.map(item => ({ date: item.date.split('T')[0], close: item.close })).sort((a,b)=>a.date.localeCompare(b.date));
}

async function fetchStockName(symbol, token){
  const cleanSymbol = symbol.trim().toUpperCase();
  if(nameMap[cleanSymbol]) return nameMap[cleanSymbol];
  if(!token) return cleanSymbol;
  try {
    const url = `https://api.tiingo.com/tiingo/daily/${encodeURIComponent(cleanSymbol.toLowerCase())}?token=${token}`;
    const res = await fetch(url);
    if(res.ok) {
      const json = await res.json();
      if(json && json.name) { nameMap[cleanSymbol] = json.name; return json.name; }
    }
  } catch(e){}
  return cleanSymbol;
}

function buildGroupHTML(id,seq,data={}){
  return `
    <details class="group-card" data-group-id="${id}" open>
      <summary class="group-summary">${data.groupName||`群組 ${seq}`}</summary>
      <div class="group-body">
        <div class="group-head">
          <div><label>群組名稱</label><input type="text" class="group-name" placeholder="例如：美股科技結構組合"></div>
          <div style="width:104px;"><button class="secondary" onclick="removeGroup('${id}')">刪除群組</button></div>
        </div>
        <div class="group-dates">
          <div class="group-date-toggle-container">
            <span class="group-date-toggle-label">使用群組日期區間</span>
            <label class="switch"><input type="checkbox" class="group-use-dates"><span class="slider"></span></label>
          </div>
          <div class="grid">
            <div><label>群組起始日期</label><input type="date" class="group-start"></div>
            <div><label>群組結束日期</label><input type="date" class="group-end"></div>
          </div>
        </div>
        <div class="group-limits">
          <div><label>KO 提前出場 (購入價 %)</label><input type="number" step="0.1" class="group-ko" placeholder="例如 105"></div>
          <div><label>Strike 執行價 (購入價 %)</label><input type="number" step="0.1" class="group-strike" placeholder="例如 80"></div>
          <div><label>KI 敲入價 (購入價 %)</label><input type="number" step="0.1" class="group-ki" placeholder="例如 70"></div>
        </div>
        <div class="stock-list"></div>
        <div class="group-actions"><button class="secondary" onclick="addStock('${id}')">＋ 新增股票</button></div>
      </div>
    </details>`;
}

function bindGroupEvents(el, seq){
  const groupNameInput=el.querySelector('.group-name');
  const useDatesInput=el.querySelector('.group-use-dates');
  const groupStartInput=el.querySelector('.group-start');
  const groupEndInput=el.querySelector('.group-end');
  const koInput=el.querySelector('.group-ko');
  const strikeInput=el.querySelector('.group-strike');
  const kiInput=el.querySelector('.group-ki');

  groupNameInput.addEventListener('input',()=>{ el.querySelector('.group-summary').textContent=groupNameInput.value.trim()||`群組 ${seq}`; saveSettings(false); });
  useDatesInput.addEventListener('change',()=>{ const on=useDatesInput.checked; groupStartInput.disabled=!on; groupEndInput.disabled=!on; saveSettings(false); });
  groupStartInput.addEventListener('change',()=>saveSettings(false));
  groupEndInput.addEventListener('change',()=>saveSettings(false));
  koInput.addEventListener('input',()=>saveSettings(false));
  strikeInput.addEventListener('input',()=>saveSettings(false));
  kiInput.addEventListener('input',()=>saveSettings(false));
  groupStartInput.disabled=!useDatesInput.checked;
  groupEndInput.disabled=!useDatesInput.checked;
}

function fillGroupValues(el, data){
  el.querySelector('.group-name').value=data.groupName||'';
  el.querySelector('.group-use-dates').checked=!!data.useDates;
  el.querySelector('.group-start').value=data.start||'';
  el.querySelector('.group-end').value=data.end||'';
  el.querySelector('.group-ko').value=data.koValue??'105';
  el.querySelector('.group-strike').value=data.strikeValue??'80';
  el.querySelector('.group-ki').value=data.kiValue??'70';
  el.querySelector('.group-start').disabled=!data.useDates;
  el.querySelector('.group-end').disabled=!data.useDates;
  el.querySelector('.group-summary').textContent=data.groupName||el.querySelector('.group-summary').textContent;
}

function addGroup(data=null){
  groupSeq+=1;
  const id=`group_${groupSeq}`;
  const wrap=document.createElement('div');
  wrap.innerHTML=buildGroupHTML(id,groupSeq,data||{});
  const el=wrap.firstElementChild;
  document.getElementById('groups').appendChild(el);
  fillGroupValues(el,data||{});
  bindGroupEvents(el,groupSeq);
  if(data?.stocks?.length){
    el.querySelector('.stock-list').innerHTML='';
    data.stocks.forEach(s=>addStock(id,s));
  } else { addStock(id); }
  saveSettings(false);
}

function removeGroup(id){document.querySelector(`[data-group-id="${id}"]`)?.remove();saveSettings(false)}

function addStock(groupId,data=null){
  stockSeq+=1;
  const sid=`stock_${stockSeq}`;
  const groupEl=document.querySelector(`[data-group-id="${groupId}"]`);
  if(!groupEl)return;
  const list=groupEl.querySelector('.stock-list');
  const row=document.createElement('div');
  row.className='stock-row';
  row.dataset.stockId=sid;
  row.innerHTML=`
    <div><label>股票代碼</label><input type="text" class="stock-code" placeholder="例如 AAPL"></div>
    <div><label>購入價格</label><input type="number" step="0.01" class="stock-buy" placeholder="例如 180"></div>
    <div><label>股數</label><input type="number" step="1" class="stock-shares" placeholder="例如 1"></div>
    <div><label>&nbsp;</label><button onclick="removeStock('${sid}')">刪除</button></div>`;
  list.appendChild(row);
  row.querySelector('.stock-code').addEventListener('input', () => saveSettings(false));
  row.querySelector('.stock-buy').addEventListener('input', () => saveSettings(false));
  row.querySelector('.stock-shares').addEventListener('input', () => saveSettings(false));
  if(data){
    row.querySelector('.stock-code').value=data.code||'';
    row.querySelector('.stock-buy').value=data.buy??'';
    row.querySelector('.stock-shares').value=data.shares??1;
  }else{ row.querySelector('.stock-shares').value=1; }
  saveSettings(false);
}
function removeStock(id){document.querySelector(`[data-stock-id="${id}"]`)?.remove();saveSettings(false)}

function collectSettings(){
  const token = document.getElementById('tiingoToken')?.value.trim() || '';
  const groups=[];
  document.querySelectorAll('.group-card').forEach(groupEl=>{
    const groupName=groupEl.querySelector('.group-name')?.value.trim()||'';
    const groupId=groupEl.dataset.groupId;
    const useDates=groupEl.querySelector('.group-use-dates')?.checked||false;
    const start=groupEl.querySelector('.group-start')?.value||'';
    const end=groupEl.querySelector('.group-end')?.value||'';
    const koValue=Number(groupEl.querySelector('.group-ko')?.value)||105;
    const strikeValue=Number(groupEl.querySelector('.group-strike')?.value)||80;
    const kiValue=Number(groupEl.querySelector('.group-ki')?.value)||70;
    const stocks=[];
    groupEl.querySelectorAll('.stock-row').forEach((row, idx)=>{
      const code=row.querySelector('.stock-code')?.value.trim().toUpperCase();
      const buy=Number(row.querySelector('.stock-buy')?.value);
      const shares=Number(row.querySelector('.stock-shares')?.value)||1;
      if(code && Number.isFinite(buy)) stocks.push({id:`${groupId}_${idx+1}`,code,buy,shares});
    });
    if(groupName || stocks.length) groups.push({groupId,groupName,useDates,start,end,koValue,strikeValue,kiValue,stocks});
  });
  return{token, groups};
}

function saveSettings(showToast=true){localStorage.setItem(STORAGE_KEY,JSON.stringify(collectSettings()));if(showToast)alert('已儲存')}
function clearSettings(){
  localStorage.removeItem(STORAGE_KEY);
  document.getElementById('tiingoToken').value = '';
  document.getElementById('groups').innerHTML='';
  groupSeq=0; stockSeq=0; addGroup();
}

function loadSettings(){
  const raw=localStorage.getItem(STORAGE_KEY);
  if(!raw){addGroup();return}
  try{
    const data=JSON.parse(raw);
    document.getElementById('tiingoToken').value = data.token || '';
    document.getElementById('groups').innerHTML='';
    groupSeq=0; stockSeq=0;
    if(data.groups && data.groups.length){
      data.groups.forEach(g=>{
        groupSeq+=1;
        const id=`group_${groupSeq}`;
        const wrap=document.createElement('div');
        wrap.innerHTML=buildGroupHTML(id,groupSeq,g);
        const el=wrap.firstElementChild;
        document.getElementById('groups').appendChild(el);
        fillGroupValues(el,g); bindGroupEvents(el,groupSeq);
        const list=el.querySelector('.stock-list');
        list.innerHTML='';
        (g.stocks||[]).forEach(s=>{
          stockSeq+=1; const sid=`stock_${stockSeq}`;
          const row=document.createElement('div'); row.className='stock-row'; row.dataset.stockId=sid;
          row.innerHTML=`
            <div><label>股票代碼</label><input type="text" class="stock-code" placeholder="例如 AAPL"></div>
            <div><label>購入價格</label><input type="number" step="0.01" class="stock-buy" placeholder="例如 180"></div>
            <div><label>股數</label><input type="number" step="1" class="stock-shares" placeholder="例如 1"></div>
            <div><label>&nbsp;</label><button onclick="removeStock('${sid}')">刪除</button></div>`;
          row.querySelector('.stock-code').value=s.code||'';
          row.querySelector('.stock-buy').value=s.buy??'';
          row.querySelector('.stock-shares').value=s.shares??1;
          row.querySelector('.stock-code').addEventListener('input', () => saveSettings(false));
          row.querySelector('.stock-buy').addEventListener('input', () => saveSettings(false));
          row.querySelector('.stock-shares').addEventListener('input', () => saveSettings(false));
          list.appendChild(row);
        });
      });
    } else { addGroup(); }
  }catch(e){addGroup()}
}

function expandAllGroups(){document.querySelectorAll('details.group-card').forEach(d=>d.open=true)}
function collapseAllGroups(){document.querySelectorAll('details.group-card').forEach(d=>d.collapse=true)}

function getCardClass(status){
  if(status==='KO')return'ko'; if(status==='KI')return'ki'; if(status==='Strike')return'strike'; return'normal';
}
function getStatusBadge(status){
  if(status==='KO')return`<span class="status-badge ko">KO 提前出場</span>`;
  if(status==='KI')return`<span class="status-badge ki">KI 已敲入</span>`;
  if(status==='Strike')return`<span class="status-badge strike">Strike 執行價區間</span>`;
  return`<span class="status-badge normal">正常</span>`;
}

// 根據判定狀態與目前百分比字串，組合出 "KO : 130.00%" 這種精簡格式
function makeDisplayLine(status, pctStr) {
  if (status === 'Normal') {
    return `Normal : ${pctStr}`;
  }
  return `${status} : ${pctStr}`;
}

function makeGroupBlock(groupName,items, groupStatus){
  return `
    <div class="card">
      <div class="section-title" style="display:flex; justify-content:space-between; align-items:center;">
        <span>${groupName}</span>
        ${getStatusBadge(groupStatus)}
      </div>
      <div class="stocks">
        ${items.map(x=>`
          <div class="stock-card ${getCardClass(groupStatus)}" data-stockid="${x.stockId}">
            <div class="line1">${x.code} / ${x.name}</div>
            <div class="line2">最新收盤：${x.closeText}</div>
            <div class="line2">購入價格：${x.buy.toFixed(2)}</div>
            <div class="line-pct">${makeDisplayLine(groupStatus, x.pctValueText)}</div>
          </div>
        `).join('')}
      </div>
    </div>`;
}

function drawModalChart(stock){
  const ctx=document.getElementById('modalChart').getContext('2d');
  if(modalChart) modalChart.destroy();
  const koPrice = stock.buy * (stock.koPct / 100);
  const strikePrice = stock.buy * (stock.strikePct / 100);
  const kiPrice = stock.buy * (stock.kiPct / 100);
  const koLine=stock.labels.map(()=>+koPrice.toFixed(2));
  const strikeLine=stock.labels.map(()=>+strikePrice.toFixed(2));
  const kiLine=stock.labels.map(()=>+kiPrice.toFixed(2));
  modalChart=new Chart(ctx,{
    type:'line',
    data:{
      labels:stock.labels,
      datasets:[
        {label:'收盤價',data:stock.closes,borderColor:'#4f46e5',backgroundColor:'rgba(79,70,229,.12)',tension:.25,pointRadius:2,borderWidth:2},
        {label:`KO (${stock.koPct}%)`,data:koLine,borderColor:'#3b82f6',borderDash:[4,4],tension:0,pointRadius:0,borderWidth:2},
        {label:`Strike (${stock.strikePct}%)`,data:strikeLine,borderColor:'#f59e0b',borderDash:[4,4],tension:0,pointRadius:0,borderWidth:2},
        {label:`KI (${stock.kiPct}%)`,data:kiLine,borderColor:'#ef4444',borderDash:[4,4],tension:0,pointRadius:0,borderWidth:2}
      ]
    },
    options:{ responsive:true, maintainAspectRatio:false, plugins:{legend:{position:'top'}}, scales:{x:{ticks:{maxRotation:0,autoSkip:true}},y:{beginAtZero:false}} }
  });
}
function openModal(stock){
  document.getElementById('modalTitle').textContent=`${stock.code} / ${stock.name}`;
  document.getElementById('modalInfo').textContent=`群組：${stock.group}｜購入價：${stock.buy.toFixed(2)}｜目前比率：${stock.pctValueText}｜KO：${stock.koPct}%｜Strike：${stock.strikePct}%｜KI：${stock.kiPct}%`;
  document.getElementById('chartModal').classList.add('show');
  setTimeout(()=>drawModalChart(stock),0);
}
function closeModal(event){
  if(event && event.target!==event.currentTarget) return;
  document.getElementById('chartModal').classList.remove('show');
  if(modalChart){modalChart.destroy();modalChart=null}
}

function drawPie(items){
  const canvas=document.getElementById('assetPie');
  if(!canvas) return;
  const filtered=items.filter(x=>x.asset>0);
  const total=filtered.reduce((a,b)=>a+b.asset,0);
  const sorted=[...filtered].sort((a,b)=>b.asset-a.asset);
  const top=sorted.slice(0,8);
  const other=sorted.slice(8).reduce((a,b)=>a+b.asset,0);
  if(other>0) top.push({stockId:'other',code:'Other',name:'其他',asset:other});
  pieDataCache=top.map(x=>({
    stockId:x.stockId,code:x.code,name:x.name,asset:x.asset, shares:x.shares||1,pct: total>0 ? x.asset/total*100 : 0,group:x.group||''
  }));
  const labels=pieDataCache.map(x=>`${x.code} ${x.name}`);
  const values=pieDataCache.map(x=>x.asset);
  document.getElementById('pieInfo').textContent=total>0?`總資產約 ${total.toFixed(2)} USD`:'目前沒有可計算的資產資料。';
  if(pieChart) pieChart.destroy();
  pieChart=new Chart(canvas.getContext('2d'),{
    type:'pie',
    data:{labels,datasets:[{data:values}]},
    options:{
      responsive:true, maintainAspectRatio:false, plugins:{legend:{position:'right'}}, layout:{padding:6},
      onClick:(event,elements)=>{ if(!elements.length) return; openPieModal(pieDataCache[elements[0].index]); }
    }
  });
}

function openPieModal(item){
  document.getElementById('pieModalTitle').textContent='目前資產細節';
  document.getElementById('pieModalInfo').textContent=`${item.code} / ${item.name}｜金額：${item.asset.toFixed(2)}｜占比：${item.pct.toFixed(1)}%｜股數：${item.shares || 1}`;
  document.getElementById('pieModal').classList.add('show');
  if(pieModalChart) pieModalChart.destroy();
  const ctx=document.getElementById('pieModalChart').getContext('2d');
  const labels=pieDataCache.map(x=>`${x.code} ${x.name}`);
  const values=pieDataCache.map(x=>x.asset);
  pieModalChart=new Chart(ctx,{ type:'pie', data:{labels,datasets:[{data:values}]}, options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'right'}}} });
}
function closePieModal(event){
  if(event && event.target!==event.currentTarget) return;
  document.getElementById('pieModal').classList.remove('show');
  if(pieModalChart){pieModalChart.destroy();pieModalChart=null}
}

async function loadAll(){
  const output=document.getElementById('output');
  saveSettings(false);
  const settings = collectSettings();
  const groups = settings.groups;
  const token = settings.token;
  if(!groups.length){ output.innerHTML='<div class="card">請至少新增一個群組與一檔股票。</div>'; drawPie([]); return; }
  output.innerHTML='<div class="card">讀取中...</div>';
  try{
    const results=[]; stockCache=[]; const groupStatusMap = {};
    for(const g of groups){
      if(!g.useDates || !g.start || !g.end) {
        output.innerHTML=`<div class="card" style="color:#e11d48; font-weight:bold;">提示：群組「${g.groupName||'未命名'}」未開啟或未填寫「群組日期區間」，無法進行追蹤。</div>`;
        return;
      }
      let allStocksInGroupKO = true; let anyStockInGroupKI = false; let anyStockInGroupStrike = false;
      const currentGroupResults = [];

      for(const s of g.stocks){
        // 自動防禦，每次請求強制延遲 500 毫秒避免 429
        await delay(500);

        const cleanCode = s.code.trim();
        let data = [];
        try { data = await fetchTiingoRange(cleanCode, g.start, g.end, token); } catch(err) {
          if(err.message === '404') { throw new Error(`找不到美股代號「${cleanCode}」，請檢查拼字是否正確。`); } else { throw err; }
        }
        const closes=data.map(x=>x.close);
        const minClose=closes.length?Math.min(...closes):null;
        const lastClose=closes.length?closes[closes.length-1]:null;
        const name=await fetchStockName(cleanCode, token);
        const asset=lastClose===null?0:lastClose*(s.shares||1);
        
        // 換算比對極限值
        const koPrice = s.buy * (g.koValue / 100);
        const strikePrice = s.buy * (g.strikeValue / 100);
        const kiPrice = s.buy * (g.kiValue / 100);

        if (lastClose === null || lastClose < koPrice) { allStocksInGroupKO = false; }
        if (minClose !== null && minClose <= kiPrice) { anyStockInGroupKI = true; }
        if (lastClose !== null && lastClose >= kiPrice && lastClose < strikePrice) { anyStockInGroupStrike = true; }

        let pctValueText = '0.00%';
        if (lastClose !== null && s.buy > 0) { pctValueText = `${((lastClose / s.buy) * 100).toFixed(2)}%`; }

        const obj={
          stockId:s.id || `${g.groupId}_${cleanCode}_${s.buy}_${s.shares}`,
          groupId:g.groupId, group:g.groupName||'未命名群組', code:cleanCode, name, buy:s.buy, shares:s.shares||1,
          koPct: g.koValue, strikePct: g.strikeValue, kiPct: g.kiValue,
          labels:data.map(x=>x.date), closes, closeText:lastClose===null?'沒有資料':`${lastClose.toFixed(2)}`,
          pctValueText, asset
        };
        currentGroupResults.push(obj); results.push(obj); stockCache.push(obj);
      }

      let finalStatus = "Normal";
      if (currentGroupResults.length > 0) {
        if (allStocksInGroupKO) { finalStatus = "KO"; }
        else if (anyStockInGroupKI) { finalStatus = "KI"; }
        else if (anyStockInGroupStrike) { finalStatus = "Strike"; }
      }
      groupStatusMap[g.groupName || '未命名群組'] = finalStatus;
    }

    const orderedGroups=[...new Set(results.map(x=>x.group))];
    output.innerHTML=orderedGroups.map(gName=>{
      return makeGroupBlock(gName, results.filter(x=>x.group===gName), groupStatusMap[gName]);
    }).join('');

    document.querySelectorAll('.stock-card').forEach(el=>{
      el.addEventListener('click',()=>{
        const sid=el.getAttribute('data-stockid'); const stock=stockCache.find(s=>s.stockId===sid); if(stock) openModal(stock);
      });
    });
    drawPie(results);
  }catch(e){ output.innerHTML=`<div class="card" style="color:red; font-weight:bold;">抓取失敗：${e.message}</div>`; drawPie([]); }
}

async function init(){
  loadSettings();
  document.getElementById('output').innerHTML='<div class="card">請輸入資料後，點擊「抓取並顯示」按鈕開始追蹤美股結構。</div>';
}
init();
</script>
