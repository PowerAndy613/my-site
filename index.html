<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>投資人FCN儀表板 - 完整合約邏輯</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    *{box-sizing:border-box}
    body{
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",sans-serif;
      margin:0;
      padding:10px;
      padding-bottom:92px;
      background:#f6f7fb;
      color:#111;
      -webkit-font-smoothing:antialiased;
    }
    h1{font-size:20px;margin:0 0 10px;line-height:1.2}
    .card{
      background:#fff;
      border-radius:16px;
      box-shadow:0 2px 10px rgba(0,0,0,.06);
      padding:12px;
      margin-bottom:10px
    }
    .section-title{font-size:15px;font-weight:800;margin-bottom:8px}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    label{display:block;font-size:12px;color:#667085;margin-bottom:4px}
    input,button{
      width:100%;
      box-sizing:border-box;
      font-size:14px;
      border-radius:12px;
      border:1px solid #d9deea;
      padding:10px;
      background:#fff
    }
    button{
      background:#4f46e5;
      color:#fff;
      border:0;
      font-weight:800;
      cursor:pointer;
      min-height:42px
    }
    .secondary{background:#e5e7eb;color:#111}
    .danger{background:#ef4444;color:#fff}
    .success{background:#10b981;color:#fff}
    .outline{background:transparent;color:#fff;border:1px solid rgba(255,255,255,0.3)}

    /* 客戶層級卡片 */
    .client-card{
      border:2px solid #4f46e5;
      border-radius:18px;
      background:#f8f7ff;
      margin-bottom:14px;
      overflow:hidden
    }
    .client-header{
      background:#4f46e5;
      color:#fff;
      padding:10px 14px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      flex-wrap:wrap;
      gap:6px;
      cursor:pointer
    }
    .client-header .client-name{
      font-weight:900;
      font-size:16px;
      background:transparent;
      border:none;
      color:#fff;
      padding:2px 6px;
      border-radius:6px;
      min-width:60px;
      cursor:text;
      flex:1;
    }
    .client-header .client-name:focus{
      outline:2px solid rgba(255,255,255,0.5);
      background:rgba(255,255,255,0.15);
    }
    .client-header .client-name::placeholder{color:rgba(255,255,255,0.6)}
    .client-header .client-actions{display:flex;gap:4px;flex-wrap:wrap}
    .client-header .client-actions button{
      background:rgba(255,255,255,.2);
      color:#fff;
      border:0;
      padding:4px 10px;
      border-radius:10px;
      font-size:11px;
      font-weight:700;
      min-height:28px;
      width:auto;
      transition:background .2s;
    }
    .client-header .client-actions button:hover{background:rgba(255,255,255,.35)}
    .client-header .client-actions button.outline{background:transparent;border:1px solid rgba(255,255,255,0.3)}
    .client-header .client-actions button.outline:hover{background:rgba(255,255,255,0.15)}
    .client-body{padding:10px}
    .client-body .group-list{margin-top:6px}

    /* 群組卡片（子層） */
    details.group-card{
      border:1px solid #d9deea;
      border-radius:14px;
      background:#fff;
      margin-bottom:8px;
      overflow:hidden
    }
    details.group-card[open]{box-shadow:0 2px 8px rgba(0,0,0,.06)}
    summary.group-summary{
      list-style:none;
      cursor:pointer;
      padding:10px 14px;
      font-weight:900;
      font-size:15px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:8px;
      background:#fafbff;
      border-bottom:1px solid #e5e7eb;
      flex-wrap:wrap;
    }
    summary.group-summary::-webkit-details-marker{display:none}
    summary.group-summary::after{
      content:"▾";
      font-size:14px;
      color:#667085;
      transition:transform .15s ease
    }
    details.group-card[open] summary.group-summary::after{transform:rotate(180deg)}
    .group-body{padding:10px}
    .group-head{
      display:grid;
      grid-template-columns:1fr 1fr 1fr 80px;
      gap:6px;
      align-items:end;
      margin-bottom:8px
    }
    .group-limits{
      display:grid;
      grid-template-columns:1fr 1fr 1fr 1fr 1fr;
      gap:6px;
      margin-bottom:8px
    }
    .group-dates{
      border:1px solid #e2e8f0;
      border-radius:12px;
      padding:10px;
      margin-bottom:10px;
      background:#fafcff;
    }
    .group-date-toggle-container {
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:8px;
      padding-bottom:6px;
      border-bottom:1px dashed #e2e8f0;
    }
    .group-date-toggle-label {font-size:13px;font-weight:800;color:#334155}
    .switch {
      position:relative;display:inline-block;width:40px;height:22px;
    }
    .switch input{opacity:0;width:0;height:0}
    .slider{
      position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;
      background:#cbd5e1;transition:.3s;border-radius:22px;
    }
    .slider:before{
      position:absolute;content:"";height:16px;width:16px;left:3px;bottom:3px;
      background:#fff;transition:.3s;border-radius:50%;
    }
    input:checked + .slider{background:#4f46e5}
    input:checked + .slider:before{transform:translateX(18px)}

    .stock-row{
      display:grid;
      grid-template-columns:1fr 1fr .9fr 60px;
      gap:6px;
      margin-top:6px;
      align-items:end
    }
    .stock-row button{background:#ef4444;padding:8px 4px;min-height:36px;font-size:12px}
    .group-actions{
      display:flex;gap:6px;margin-top:8px;flex-wrap:wrap
    }
    .group-actions button{flex:1 1 100px;min-height:36px;font-size:13px}

    .stocks{
      display:grid;
      grid-template-columns:repeat(2, minmax(0, 1fr));
      gap:6px
    }
    .stock-card{
      background:linear-gradient(180deg,#fff 0%,#fbfbff 100%);
      border-radius:12px;
      padding:8px 10px;
      border:2px solid #d8deea;
      box-shadow:0 1px 4px rgba(0,0,0,.04);
      min-height:90px;
      display:flex;
      flex-direction:column;
      justify-content:center;
      cursor:pointer;
      user-select:none
    }
    .stock-card.ko{background:#dbeafe;border:4px solid #3b82f6}
    .stock-card.ki{background:#fecaca;border:4px solid #ef4444}
    .stock-card.strike{background:#fef3c7;border:4px solid #f59e0b}
    .stock-card.normal{background:#d1fae5;border:4px solid #10b981}
    .stock-card.ko .line-pct {color:#2563eb}
    .stock-card.ki .line-pct {color:#dc2626}
    .stock-card.strike .line-pct {color:#d97706}
    .stock-card.normal .line-pct {color:#059669}
    
    .status-badge{
      display:inline-block;padding:2px 8px;border-radius:8px;font-size:11px;font-weight:900;color:#fff;width:max-content;margin-top:4px
    }
    .status-badge.ko{background:#3b82f6}
    .status-badge.ki{background:#ef4444}
    .status-badge.strike{background:#f59e0b}
    .status-badge.normal{background:#10b981}

    .line1{font-size:15px;font-weight:900;line-height:1.2}
    .line2{font-size:12px;margin-top:2px;line-height:1.2;color:#1f2937}
    .line-pct{font-size:14px;margin-top:4px;line-height:1.2;font-weight:900}
    
    .small{color:#6b7280;font-size:12px;margin-top:6px;line-height:1.4}
    .tag-fcn{font-size:12px;font-weight:600;background:#e5e7eb;padding:1px 10px;border-radius:16px;white-space:nowrap}
    .tag-apr{font-size:12px;font-weight:600;background:#dbeafe;color:#1d4ed8;padding:1px 10px;border-radius:16px;white-space:nowrap}
    .tag-status{font-size:12px;font-weight:700;padding:1px 10px;border-radius:16px;white-space:nowrap}
    .tag-status.ko{background:#3b82f6;color:#fff}
    .tag-status.ki{background:#ef4444;color:#fff}
    .tag-status.strike{background:#f59e0b;color:#fff}
    .tag-status.normal{background:#10b981;color:#fff}

    .modal{
      display:none;position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.45);padding:12px;box-sizing:border-box
    }
    .modal.show{display:block}
    .modal-dialog{
      max-width:980px;margin:4vh auto;background:#fff;border-radius:18px;overflow:hidden;box-shadow:0 10px 30px rgba(0,0,0,.2)
    }
    .modal-header{padding:12px 16px;background:#f8f9fc;display:flex;justify-content:space-between;align-items:center;gap:10px}
    .modal-title{font-size:18px;font-weight:800}
    .modal-body{padding:14px}
    .modal-close{width:auto;background:#111;color:#fff;border:0;padding:8px 14px;border-radius:12px}
    .chart-wrap{height:280px}
    .info-line{font-size:14px;color:#444;margin-bottom:8px;line-height:1.5}

    .group-pie-wrap{border-top:1px solid #e5e7eb;padding-top:10px;margin-top:8px}
    .profit-chart-wrap{margin-top:12px;padding-top:10px;border-top:2px solid #e5e7eb}

    .mobile-bottom-nav{display:none}

    .btn-delete-group,
    .btn-delete-stock,
    .btn-delete-client {
      cursor:pointer !important;
      pointer-events:auto !important;
      touch-action:manipulation !important;
    }

    .fcn-pie-card {
      margin-top:10px;
      border-top:2px solid #e5e7eb;
      padding-top:10px;
    }
    .fcn-pie-card .pie-title {
      font-weight:700;
      font-size:14px;
      margin-bottom:6px;
      color:#1f2937;
    }

    .result-detail {
      background:#f8fafc;
      border-radius:8px;
      padding:8px 12px;
      margin-top:4px;
      font-size:13px;
      color:#1e293b;
      border-left:3px solid #4f46e5;
    }
    .result-detail strong {color:#0f172a}

    @media (max-width:760px){
      body{padding-bottom:84px}
      .grid,.group-limits,.group-head{grid-template-columns:1fr}
      .stock-row{grid-template-columns:1fr 1fr .9fr 60px}
      .client-header{flex-direction:column;align-items:stretch}
      .client-header .client-actions{justify-content:flex-start}
      .group-head{grid-template-columns:1fr 1fr}
      .group-head > div:last-child{grid-column:1/3}
      .group-limits{grid-template-columns:1fr 1fr}
      .mobile-bottom-nav{
        display:flex;position:fixed;left:0;right:0;bottom:0;z-index:10000;
        background:#fff;border-top:1px solid #e5e7eb;box-shadow:0 -4px 16px rgba(0,0,0,.08);
        padding:6px 8px calc(6px + env(safe-area-inset-bottom));gap:4px
      }
      .mobile-bottom-nav button{
        flex:1;min-height:44px;padding:4px 2px;border-radius:12px;border:1px solid #d9deea;
        background:#f9fafb;color:#111;display:flex;flex-direction:column;align-items:center;
        justify-content:center;gap:1px;font-size:10px;font-weight:800;line-height:1
      }
      .mobile-bottom-nav .nav-icon{font-size:16px;line-height:1}
      .mobile-bottom-nav .nav-text{font-size:9px;line-height:1}
      .stocks{grid-template-columns:repeat(2, minmax(0, 1fr))}
      summary.group-summary{font-size:13px}
      .tag-fcn,.tag-apr,.tag-status{font-size:10px;padding:1px 6px}
      .line1{font-size:13px}
      .line2{font-size:11px}
      .line-pct{font-size:12px}
      .group-head button,
      .stock-row button,
      .group-actions button,
      .client-actions button {
        min-height:40px !important;
        min-width:44px !important;
      }
      .client-header .client-actions button {
        font-size:10px !important;
        padding:4px 8px !important;
        min-height:32px !important;
      }
      .chart-wrap{height:220px}
    }
    @media (min-width:760px){
      body{padding:14px;padding-bottom:14px}
      .stocks{grid-template-columns:repeat(auto-fill,minmax(200px,1fr))}
      .stock-card{min-height:96px;padding:12px}
      .line1{font-size:17px}
      .line2{font-size:14px}
      .line-pct{font-size:15px}
      .chart-wrap{height:340px}
    }
  </style>
</head>
<body>

<!-- ===== 標題 ===== -->
<h1>📊 投資人FCN儀表板 - 完整合約邏輯</h1>

<div class="card">
  <div class="section-title">📋 客戶與群組管理</div>
  <div class="group-actions">
    <button class="secondary" onclick="expandAllClients()">展開全部</button>
    <button class="secondary" onclick="collapseAllClients()">收合全部</button>
    <button class="success" onclick="addClient()">＋ 客戶</button>
    <button class="secondary" onclick="addGroupToSelectedClient()">＋ 新增群組</button>
    <button onclick="loadAll()">抓取並顯示</button>
    <button class="secondary" onclick="saveSettings()">儲存設定</button>
    <button class="danger" onclick="clearSettings()">清除設定</button>
  </div>
  <div style="height:8px;"></div>
  <div id="clientsContainer"></div>
  <div class="small"><b>FCN 合約邏輯說明：</b>KO 提前出場（收盤價 ≥ KO 價）→ 拿回本金 + 配息；KI 敲入（收盤價 < KI 價）→ 觸發換股條件；Strike 履約價 → 到期換股計算基準。</div>
</div>

<div id="output"></div>

<!-- 圖表 Modal -->
<div id="chartModal" class="modal" onclick="closeModal(event)">
  <div class="modal-dialog" onclick="event.stopPropagation()">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">股票圖表</div>
      <button class="modal-close" onclick="closeModal()">關閉</button>
    </div>
    <div class="modal-body">
      <div class="info-line" id="modalInfo"></div>
      <div class="chart-wrap"><canvas id="modalChart"></canvas></div>
    </div>
  </div>
</div>

<!-- 手機版底部導航 -->
<nav class="mobile-bottom-nav" id="mobileNav">
  <button onclick="expandAllClients()">
    <span class="nav-icon"><i class="fa-solid fa-up-right-and-down-left-from-center"></i></span>
    <span class="nav-text">展開</span>
  </button>
  <button onclick="collapseAllClients()">
    <span class="nav-icon"><i class="fa-solid fa-down-left-and-up-right-to-center"></i></span>
    <span class="nav-text">收合</span>
  </button>
  <button onclick="addClient()">
    <span class="nav-icon"><i class="fa-solid fa-user-plus"></i></span>
    <span class="nav-text">+客戶</span>
  </button>
  <button onclick="addGroupToSelectedClient()">
    <span class="nav-icon"><i class="fa-solid fa-layer-group"></i></span>
    <span class="nav-text">+群組</span>
  </button>
  <button onclick="loadAll()">
    <span class="nav-icon"><i class="fa-solid fa-arrows-rotate"></i></span>
    <span class="nav-text">顯示</span>
  </button>
  <button onclick="saveSettings()">
    <span class="nav-icon"><i class="fa-solid fa-floppy-disk"></i></span>
    <span class="nav-text">儲存</span>
  </button>
  <button onclick="clearSettings()">
    <span class="nav-icon"><i class="fa-solid fa-trash"></i></span>
    <span class="nav-text">清除</span>
  </button>
</nav>

<script>
// ========== 工具函數 ==========
function formatNumber(num, decimals=2) {
  if (num === undefined || num === null || isNaN(num)) return '0';
  const fixed = Number(num).toFixed(decimals);
  const parts = fixed.split('.');
  const intPart = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ',');
  return parts[1] !== undefined ? `${intPart}.${parts[1]}` : intPart;
}
function formatCurrency(val){ return formatNumber(val, 2); }

// ========== API 設定 ==========
const PROXY_API_BASE = 'https://yfin-proxy.onrender.com/history/';
const STORAGE_KEY = 'client_group_stock_system_v3';

let modalChart = null, stockCache = [];
let clientSeq = 0, groupSeq = 0, stockSeq = 0;

async function fetchPriceRange(symbol, start, end) {
  const url = `${PROXY_API_BASE}${encodeURIComponent(symbol.trim().toUpperCase())}?start=${start}&end=${end}`;
  let response;
  try { response = await fetch(url); } catch(e) { throw new Error(`無法連線至 Proxy 伺服器`); }
  if (!response.ok) {
    if (response.status === 404) throw new Error(`找不到股票代號「${symbol}」`);
    if (response.status === 429) throw new Error(`請求次數過多 (429)，請稍候再試。`);
    throw new Error(`Proxy 伺服器錯誤 (HTTP ${response.status})`);
  }
  let rawJson;
  try { rawJson = await response.json(); } catch(e) { throw new Error('Proxy 回傳資料格式無效'); }
  const ticker = rawJson.ticker;
  if (!ticker || !rawJson.close || !rawJson.close[ticker]) {
    throw new Error(`缺少 ${symbol} 的收盤價`);
  }
  const closeData = rawJson.close[ticker];
  const sortedDates = Object.keys(closeData).sort();
  if (sortedDates.length === 0) return [];
  return sortedDates.map(dateStr => ({
    date: dateStr.split('T')[0],
    close: closeData[dateStr]
  }));
}

const delay = ms => new Promise(res => setTimeout(res, ms));
async function fetchStockName(symbol){ return symbol.trim().toUpperCase(); }

// ========== 客戶與群組 UI 生成 ==========
function buildClientHTML(clientId, seq, data={}) {
  const name = data.clientName || `客戶 ${seq}`;
  return `
    <div class="client-card" data-client-id="${clientId}">
      <div class="client-header" onclick="toggleClient('${clientId}')">
        <input class="client-name" value="${name}" placeholder="輸入客戶名稱" 
               onclick="event.stopPropagation()" 
               onchange="onClientNameChange(this)" 
               onfocus="this.select()">
        <div class="client-actions" onclick="event.stopPropagation();">
          <button onclick="addGroupToClient('${clientId}')"><i class="fa-solid fa-layer-group"></i> 群組</button>
          <button class="danger btn-delete-client" onclick="event.stopPropagation(); removeClient('${clientId}')"><i class="fa-solid fa-trash"></i></button>
          <button class="outline" onclick="event.stopPropagation(); expandClientGroups('${clientId}')"><i class="fa-solid fa-up-right-and-down-left-from-center"></i> 展開</button>
          <button class="outline" onclick="event.stopPropagation(); collapseClientGroups('${clientId}')"><i class="fa-solid fa-down-left-and-up-right-to-center"></i> 收合</button>
        </div>
      </div>
      <div class="client-body" id="clientBody_${clientId}">
        <div class="group-list" id="groupList_${clientId}"></div>
        <div class="group-actions">
          <button class="secondary" onclick="addGroupToClient('${clientId}')">＋ 新增群組 (子層)</button>
        </div>
      </div>
    </div>
  `;
}

function buildGroupHTML(groupId, clientId, seq, data={}) {
  const fcnDisplay = data.fcnAmount ? formatCurrency(data.fcnAmount) : '未設定';
  const aprDisplay = data.aprRate ? `${Number(data.aprRate).toFixed(1)}%` : '0%';
  return `
    <details class="group-card" data-group-id="${groupId}" data-client-id="${clientId}" ${data.open !== false ? 'open' : ''}>
      <summary class="group-summary">
        <span>📁 ${data.groupName || `群組 ${seq}`}</span>
        <span style="display:flex; gap:4px; flex-wrap:wrap; align-items:center;">
          <span class="tag-fcn">本金：${fcnDisplay}</span>
          <span class="tag-apr">Coupon：${aprDisplay}</span>
          <span class="tag-status ${data.status || 'normal'}">${data.status || 'Normal'}</span>
        </span>
      </summary>
      <div class="group-body">
        <div class="group-head">
          <div><label>群組名稱</label><input type="text" class="group-name" placeholder="群組名稱"></div>
          <div><label>FCN 名義本金 (USD)</label><input type="number" step="1" class="group-fcn" placeholder="100000"></div>
          <div><label>年化配息率 (Coupon %)</label><input type="number" step="0.1" class="group-apr" placeholder="12"></div>
          <div>
            <button class="danger btn-delete-group" 
                    onclick="event.stopPropagation(); removeGroup('${groupId}')" 
                    style="min-height:36px;font-size:12px;width:100%;">
              <i class="fa-solid fa-trash"></i> 刪除
            </button>
          </div>
        </div>
        <div class="group-dates">
          <div class="group-date-toggle-container">
            <span class="group-date-toggle-label">📅 使用日期區間（合約期間）</span>
            <label class="switch"><input type="checkbox" class="group-use-dates"><span class="slider"></span></label>
          </div>
          <div class="grid">
            <div><label>起始日期</label><input type="date" class="group-start"></div>
            <div><label>結束日期</label><input type="date" class="group-end"></div>
          </div>
        </div>
        <div class="group-limits">
          <div><label>KO 提前出場 (%)</label><input type="number" step="0.1" class="group-ko" placeholder="105"></div>
          <div><label>KI 敲入價 (%)</label><input type="number" step="0.1" class="group-ki" placeholder="65"></div>
          <div><label>Strike 履約價 (%)</label><input type="number" step="0.1" class="group-strike" placeholder="75"></div>
          <div><label>年化配息率 (Coupon %)</label><input type="number" step="0.1" class="group-coupon" placeholder="12"></div>
          <div><label>年基準天數</label>
            <select class="group-daycount" style="width:100%;padding:10px;border-radius:12px;border:1px solid #d9deea;">
              <option value="365">365 天</option>
              <option value="360">360 天</option>
            </select>
          </div>
        </div>
        <div class="group-limits" style="grid-template-columns:1fr 1fr;">

          <div><label>最差標的 (Worst-of) 代碼</label><input type="text" class="group-worst" placeholder="例如 AAPL (留空自動判斷)"></div>

// ========== 客戶操作 ==========
function onClientNameChange(input) {
  const clientCard = input.closest('.client-card');
  if (clientCard) saveSettings(false);
}

function addClient(data=null) {
  clientSeq++;
  const id = `client_${clientSeq}`;
  const container = document.getElementById('clientsContainer');
  const wrap = document.createElement('div');
  wrap.innerHTML = buildClientHTML(id, clientSeq, data || {});
  container.appendChild(wrap.firstElementChild);
  const clientEl = document.querySelector(`[data-client-id="${id}"]`);
  if (data?.groups) {
    data.groups.forEach(g => {

      addGroupToClient(id, gData);
    });
  } else {
    addGroupToClient(id, { groupName: '預設群組', open: true });
  }
  saveSettings(false);
  return id;
}

function removeClient(clientId) {
  showConfirmDialog('確定要刪除這個客戶及其所有群組和股票嗎？', function() {

function toggleClient(clientId) {

function expandAllClients() {

function expandClientGroups(clientId) {

// ========== 群組操作 ==========
function addGroupToClient(clientId, data=null) {
  groupSeq++;
  const gid = `group_${groupSeq}`;
  const clientEl = document.querySelector(`[data-client-id="${clientId}"]`);
  if (!clientEl) return;
  const list = document.getElementById(`groupList_${clientId}`);
  if (!list) return;
  const seq = list.querySelectorAll('.group-card').length + 1;
  const wrap = document.createElement('div');
  wrap.innerHTML = buildGroupHTML(gid, clientId, seq, data || {});
  list.appendChild(wrap.firstElementChild);
  const groupEl = document.querySelector(`[data-group-id="${gid}"]`);
  fillGroupValues(groupEl, data || {});

  if (data?.stocks) {
    data.stocks.forEach(s => addStockToGroup(gid, s));
  } else {
    addStockToGroup(gid);
  }

function fillGroupValues(el, data) {
  if (!el) return;
  el.querySelector('.group-name').value = data?.groupName || '';
  el.querySelector('.group-fcn').value = data?.fcnAmount || '';
  el.querySelector('.group-apr').value = data?.aprRate || '';
  el.querySelector('.group-ko').value = data?.koValue ?? '105';
  el.querySelector('.group-ki').value = data?.kiValue ?? '65';
  el.querySelector('.group-strike').value = data?.strikeValue ?? '75';
  el.querySelector('.group-coupon').value = data?.couponRate ?? '12';
  el.querySelector('.group-daycount').value = data?.dayCount || '365';
  el.querySelector('.group-initial-price').value = data?.initialPrice || '';
  el.querySelector('.group-worst').value = data?.worstSymbol || '';
  el.querySelector('.group-use-dates').checked = !!data?.useDates;
  el.querySelector('.group-start').value = data?.start || '';
  el.querySelector('.group-end').value = data?.end || '';
  el.querySelector('.group-start').disabled = !data?.useDates;
  el.querySelector('.group-end').disabled = !data?.useDates;
}

function bindGroupEvents(el, seq) {
  if (!el) return;
  const nameInput = el.querySelector('.group-name');
  const fcnInput = el.querySelector('.group-fcn');
  const aprInput = el.querySelector('.group-apr');
  const koInput = el.querySelector('.group-ko');
  const kiInput = el.querySelector('.group-ki');
  const strikeInput = el.querySelector('.group-strike');
  const couponInput = el.querySelector('.group-coupon');
  const daycountInput = el.querySelector('.group-daycount');
  const useDates = el.querySelector('.group-use-dates');
  const startInput = el.querySelector('.group-start');
  const endInput = el.querySelector('.group-end');

  const updateSummary = () => {
    const name = nameInput?.value.trim() || `群組 ${seq}`;
    const fcn = fcnInput?.value.trim() ? formatCurrency(Number(fcnInput.value)) : '未設定';
    const apr = aprInput?.value.trim() ? `${Number(aprInput.value).toFixed(1)}%` : '0%';
    const statusEl = el.querySelector('.tag-status');
    const status = statusEl ? statusEl.textContent : 'Normal';
    const summary = el.querySelector('.group-summary');
    if (summary) {
      summary.innerHTML = `
        <span>📁 ${name}</span>
        <span style="display:flex; gap:4px; flex-wrap:wrap; align-items:center;">
          <span class="tag-fcn">本金：${fcn}</span>
          <span class="tag-apr">Coupon：${apr}</span>
          <span class="tag-status ${status.toLowerCase()}">${status}</span>
        </span>
      `;
    }
  };

  nameInput?.addEventListener('input', updateSummary);
  fcnInput?.addEventListener('input', updateSummary);
  aprInput?.addEventListener('input', updateSummary);
  koInput?.addEventListener('input', () => saveSettings(false));
  kiInput?.addEventListener('input', () => saveSettings(false));
  strikeInput?.addEventListener('input', () => saveSettings(false));
  couponInput?.addEventListener('input', () => saveSettings(false));
  daycountInput?.addEventListener('change', () => saveSettings(false));
  useDates?.addEventListener('change', () => {
    const on = useDates.checked;
    if (startInput) startInput.disabled = !on;
    if (endInput) endInput.disabled = !on;
    saveSettings(false);
  });
  startInput?.addEventListener('change', () => saveSettings(false));
  endInput?.addEventListener('change', () => saveSettings(false));
  if (startInput) startInput.disabled = !useDates?.checked;
  if (endInput) endInput.disabled = !useDates?.checked;
}

// ========== 設定儲存與載入 ==========
function collectSettings() {
  const clients = [];
  document.querySelectorAll('.client-card').forEach(clientEl => {
    const clientId = clientEl.dataset.clientId;
    const clientName = clientEl.querySelector('.client-name')?.value?.trim() || '';
    const groups = [];
    clientEl.querySelectorAll('.group-card').forEach(groupEl => {
      const gid = groupEl.dataset.groupId;
      const groupName = groupEl.querySelector('.group-name')?.value.trim() || '';
      const fcnAmount = Number(groupEl.querySelector('.group-fcn')?.value) || 0;
      const aprRate = Number(groupEl.querySelector('.group-apr')?.value) || 0;
      const koValue = Number(groupEl.querySelector('.group-ko')?.value) || 105;
      const kiValue = Number(groupEl.querySelector('.group-ki')?.value) || 65;
      const strikeValue = Number(groupEl.querySelector('.group-strike')?.value) || 75;
      const couponRate = Number(groupEl.querySelector('.group-coupon')?.value) || 12;
      const dayCount = groupEl.querySelector('.group-daycount')?.value || '365';
      const initialPrice = Number(groupEl.querySelector('.group-initial-price')?.value) || 0;
      const worstSymbol = groupEl.querySelector('.group-worst')?.value.trim().toUpperCase() || '';
      const useDates = groupEl.querySelector('.group-use-dates')?.checked || false;
      const start = groupEl.querySelector('.group-start')?.value || '';
      const end = groupEl.querySelector('.group-end')?.value || '';
      const stocks = [];
      groupEl.querySelectorAll('.stock-row').forEach((row, idx) => {
        const code = row.querySelector('.stock-code')?.value.trim().toUpperCase();
        const buy = Number(row.querySelector('.stock-buy')?.value);
        const shares = Number(row.querySelector('.stock-shares')?.value) || 1;
        if (code && Number.isFinite(buy)) stocks.push({ code, buy, shares });
      });
      groups.push({ 
        groupId: gid, groupName, fcnAmount, aprRate, 
        koValue, kiValue, strikeValue, couponRate, dayCount,
        initialPrice, worstSymbol,
        useDates, start, end, stocks 
      });
    });
    clients.push({ clientId, clientName, groups });
  });
  return { clients };
}

function saveSettings(showToast=true) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(collectSettings()));
  if (showToast) alert('已儲存');
}

function clearSettings() {
  if (!confirm('確定要清除所有設定嗎？')) return;
  localStorage.removeItem(STORAGE_KEY);
  document.getElementById('clientsContainer').innerHTML = '';
  clientSeq = 0; groupSeq = 0; stockSeq = 0;
  addClient({ clientName: '我的客戶' });
}

function loadSettings() {
  const raw = localStorage.getItem(STORAGE_KEY);
  if (!raw) { addClient({ clientName: '我的客戶' }); return; }
  try {
    const data = JSON.parse(raw);
    document.getElementById('clientsContainer').innerHTML = '';
    clientSeq = 0; groupSeq = 0; stockSeq = 0;
    if (data.clients && data.clients.length) {
      data.clients.forEach(c => {
        clientSeq++;
        const cid = `client_${clientSeq}`;
        const wrap = document.createElement('div');
        wrap.innerHTML = buildClientHTML(cid, clientSeq, c);
        document.getElementById('clientsContainer').appendChild(wrap.firstElementChild);
        const clientEl = document.querySelector(`[data-client-id="${cid}"]`);
        if (clientEl) {
          const body = document.getElementById(`clientBody_${cid}`);
          if (body) body.style.display = '';
          const list = document.getElementById(`groupList_${cid}`);
          if (list) {
            c.groups.forEach(g => {
              groupSeq++;
              const gid = `group_${groupSeq}`;
              const seq = list.querySelectorAll('.group-card').length + 1;
              const wrap2 = document.createElement('div');
              wrap2.innerHTML = buildGroupHTML(gid, cid, seq, g);
              list.appendChild(wrap2.firstElementChild);
              const groupEl = document.querySelector(`[data-group-id="${gid}"]`);
              fillGroupValues(groupEl, g);
              bindGroupEvents(groupEl, seq);
              const stockList = document.getElementById(`stockList_${gid}`);
              if (stockList && g.stocks) {
                g.stocks.forEach(s => addStockToGroup(gid, s));
              }
            });
          }
        }
      });
    } else {
      addClient({ clientName: '我的客戶' });
    }
  } catch(e) { addClient({ clientName: '我的客戶' }); }
}

// ========== ★★★ FCN 合約計算核心邏輯 ★★★ ==========
function calculateFCNContract(groupData, stockResults) {
  const { 
    fcnAmount, couponRate, koValue, kiValue, strikeValue, 
    start, end, dayCount, initialPrice: groupInitialPrice, worstSymbol,
    stocks 
  } = groupData;
  
  if (!fcnAmount || !couponRate || !start || !end) {
    return { status: 'Normal', details: '缺少必要參數', koTriggered: false, kiTriggered: false, months: 0, totalCoupon: 0, shares: 0, finalValue: 0 };
  }

  const startDate = new Date(start);
  const endDate = new Date(end);
  const daysDiff = Math.max(0, Math.floor((endDate - startDate) / (1000 * 60 * 60 * 24)));
  const totalMonths = Math.max(1, Math.floor(daysDiff / 30));
  
  // 每月配息 = 名義本金 × 年化配息率 × (30 / 年基準天數)
  const monthlyCoupon = fcnAmount * (couponRate / 100) * (30 / Number(dayCount));
  
  // 找出最差標的
  let worstStockCode = worstSymbol;
  if (!worstStockCode && stockResults.length > 0) {
    let maxLoss = Infinity;
    let worstCode = stockResults[0]?.code || '';
    for (const s of stockResults) {
      if (s.closes.length > 0 && s.buy > 0) {
        const lastClose = s.closes[s.closes.length - 1];
        const loss = (s.buy - lastClose) / s.buy;
        if (loss > maxLoss) {
          maxLoss = loss;
          worstCode = s.code;
        }
      }
    }
    worstStockCode = worstCode;
  }
  
  const worstResult = stockResults.find(s => s.code === worstStockCode);
  if (!worstResult) {
    return { status: 'Error', details: `找不到最差標的 ${worstStockCode}` };
  }

  const initialPrice = groupInitialPrice > 0 ? groupInitialPrice : worstResult.buy;
  
  const koPrice = initialPrice * (koValue / 100);
  const kiPrice = initialPrice * (kiValue / 100);
  const strikePrice = initialPrice * (strikeValue / 100);
  
  let koTriggered = false;
  let kiTriggered = false;
  let koDate = null;
  let kiDate = null;
  let triggeredMonth = totalMonths;
  
  const closes = worstResult.closes;
  const labels = worstResult.labels;
  
  for (let i = 0; i < closes.length; i++) {
    const price = closes[i];
    if (price >= koPrice) {
      koTriggered = true;
      koDate = labels[i];
      const d = new Date(labels[i]);
      const monthDiff = Math.floor((d - startDate) / (1000 * 60 * 60 * 24 * 30));
      triggeredMonth = Math.min(triggeredMonth, Math.max(1, monthDiff) + 1);
      break;
    }
    if (price < kiPrice) {
      kiTriggered = true;
      kiDate = labels[i];
    }
  }
  
  let status = 'Normal';
  let finalValue = fcnAmount;
  let shares = 0;
  let earnedMonths = 0;
  let totalCoupon = 0;
  let statusDetail = '';
  const lastClose = closes[closes.length - 1];
  
  if (koTriggered) {
    status = 'KO';
    earnedMonths = Math.min(triggeredMonth, totalMonths);
    totalCoupon = monthlyCoupon * earnedMonths;
    finalValue = fcnAmount + totalCoupon;
    statusDetail = `✅ KO 提前出場 (${koDate})，拿回本金 ${formatCurrency(fcnAmount)} + 配息 ${formatCurrency(totalCoupon)}`;
  } else if (kiTriggered) {
    if (lastClose >= strikePrice) {
      status = 'Normal';
      earnedMonths = totalMonths;
      totalCoupon = monthlyCoupon * totalMonths;
      finalValue = fcnAmount + totalCoupon;
      statusDetail = `⚠️ KI 已觸發但到期價 (${formatCurrency(lastClose)}) ≥ Strike (${formatCurrency(strikePrice)})，拿回本金 ${formatCurrency(fcnAmount)} + 配息 ${formatCurrency(totalCoupon)}`;
    } else {
      status = 'Strike';
      earnedMonths = totalMonths;
      totalCoupon = monthlyCoupon * totalMonths;
      shares = fcnAmount / strikePrice;
      finalValue = lastClose * shares + totalCoupon;
      statusDetail = `🔄 KI 已觸發且到期價 (${formatCurrency(lastClose)}) < Strike (${formatCurrency(strikePrice)})，換股 ${shares.toFixed(4)} 股，價值 ${formatCurrency(lastClose * shares)} + 配息 ${formatCurrency(totalCoupon)}`;
    }
  } else {
    status = 'Normal';
    earnedMonths = totalMonths;
    totalCoupon = monthlyCoupon * totalMonths;
    finalValue = fcnAmount + totalCoupon;
    statusDetail = `✅ 合約正常到期，拿回本金 ${formatCurrency(fcnAmount)} + 配息 ${formatCurrency(totalCoupon)}`;
  }
  
  return {
    status: status,
    statusDetail: statusDetail,
    koTriggered: koTriggered,
    kiTriggered: kiTriggered,
    koDate: koDate,
    kiDate: kiDate,
    koPrice: koPrice,
    kiPrice: kiPrice,
    strikePrice: strikePrice,
    initialPrice: initialPrice,
    worstSymbol: worstStockCode,
    months: earnedMonths,
    totalMonths: totalMonths,
    monthlyCoupon: monthlyCoupon,
    totalCoupon: totalCoupon,
    shares: shares,
    finalValue: finalValue,
    lastClose: lastClose,
    fcnAmount: fcnAmount,
    couponRate: couponRate
  };
}

// ========== 顯示與計算 ==========
function getCardClass(status) {
  if (status === 'KO') return 'ko';
  if (status === 'KI') return 'ki';
  if (status === 'Strike') return 'strike';
  return 'normal';
}

function getStatusBadge(status) {
  if (status === 'KO') return `<span class="status-badge ko">KO 提前出場</span>`;
  if (status === 'KI') return `<span class="status-badge ki">KI 已敲入</span>`;
  if (status === 'Strike') return `<span class="status-badge strike">Strike 換股</span>`;
  return `<span class="status-badge normal">正常</span>`;
}

  if (status === 'KO') return `KO : ${pctStr} 🎯`;
  if (status === 'KI') return `KI : ${pctStr} ⚠️`;
  if (status === 'Strike') return `Strike : ${pctStr} 🔄`;
  return `Normal : ${pctStr}`;
}

  if (!settings.clients.length) {
    output.innerHTML = '<div class="card">請至少新增一個客戶與群組。</div>';
    return;
  }
  output.innerHTML = '<div class="card">⏳ 讀取中...</div>';

  try {
    const allResults = [];
    const allGroupData = [];
    stockCache = [];
    const fcnPieDataByClient = {};

    for (const client of settings.clients) {
      fcnPieDataByClient[client.clientName] = [];
      for (const g of client.groups) {
        if (!g.useDates || !g.start || !g.end) {

        }
        if (!g.stocks || !g.stocks.length) continue;

        const groupResults = [];
        const stockResultsForContract = [];

        for (const s of g.stocks) {
          await delay(500);
          const cleanCode = s.code.trim();
          let data = [];
          try {
            data = await fetchPriceRange(cleanCode, g.start, g.end);
          } catch(err) {
            throw new Error(`抓取 ${cleanCode} 失敗：${err.message}`);
          }
          const closes = data.map(x => x.close);
          const lastClose = closes.length ? closes[closes.length-1] : null;
          const name = await fetchStockName(cleanCode);
          const asset = lastClose !== null ? lastClose * (s.shares || 1) : 0;

          const obj = {
            stockId: `${g.groupId}_${cleanCode}`,
            client: client.clientName,
            group: g.groupName || '未命名',
            code: cleanCode,
            name,
            buy: s.buy,
            shares: s.shares || 1,
            labels: data.map(x => x.date),
            closes: closes,
            closeText: lastClose !== null ? formatCurrency(lastClose) : '無資料',
            asset,
            groupId: g.groupId
          };
          groupResults.push(obj);
          allResults.push(obj);
          stockCache.push(obj);
          stockResultsForContract.push({ 
            code: cleanCode, 
            buy: s.buy, 
            closes, 
            labels: data.map(x => x.date) 
          });
        }

        const contractResult = calculateFCNContract({
          fcnAmount: g.fcnAmount || 0,
          couponRate: g.couponRate || g.aprRate || 0,
          koValue: g.koValue || 105,
          kiValue: g.kiValue || 65,
          strikeValue: g.strikeValue || 75,
          start: g.start,
          end: g.end,
          dayCount: g.dayCount || '365',
          initialPrice: g.initialPrice || 0,
          worstSymbol: g.worstSymbol || '',
          stocks: g.stocks
        }, stockResultsForContract);

        groupResults.forEach(r => {
          const lastClose = r.closes.length ? r.closes[r.closes.length-1] : null;
          if (lastClose !== null && r.buy > 0) {
            r.pctValueText = `${((lastClose / r.buy) * 100).toFixed(2)}%`;
          } else {
            r.pctValueText = '0.00%';
          }
        });

        const groupStatus = contractResult.status;
        allGroupData.push({
          client: client.clientName,
          groupName: g.groupName || '未命名',
          groupId: g.groupId,
          fcnAmount: g.fcnAmount || 0,
          couponRate: g.couponRate || g.aprRate || 0,
          status: groupStatus,
          stocks: groupResults,
          contract: contractResult
        });

        if (g.fcnAmount > 0) {
          fcnPieDataByClient[client.clientName].push({
            label: g.groupName || '未命名',
            value: g.fcnAmount,
            status: groupStatus
          });
        }

        const groupEl = document.querySelector(`[data-group-id="${g.groupId}"]`);
        if (groupEl) {
          const statusTag = groupEl.querySelector('.tag-status');
          if (statusTag) {
            statusTag.textContent = groupStatus;
            statusTag.className = `tag-status ${groupStatus.toLowerCase()}`;
          }
        }
      }
    }

    // ===== 生成輸出 HTML =====
    let html = '';
    const profitChartData = [];
    const profitColors = ['#4f46e5', '#f59e0b', '#ef4444', '#10b981', '#8b5cf6', '#ec4899', '#06b6d4', '#f97316'];

    const clientGroups = {};
    allGroupData.forEach(g => {
      if (!clientGroups[g.client]) clientGroups[g.client] = [];
      clientGroups[g.client].push(g);
    });

    let colorIdx = 0;
    for (const [client, groups] of Object.entries(clientGroups)) {
      html += `<div class="card" style="border-left:4px solid #4f46e5;">`;
      html += `<div class="section-title">👤 ${client}</div>`;

      for (const g of groups) {
        const c = g.contract;
        html += `
          <div style="background:#fafbff;border-radius:12px;padding:10px;margin-bottom:8px;border:1px solid #e5e7eb;">
            <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:4px;margin-bottom:6px;">
              <span style="font-weight:800;font-size:15px;">📁 ${g.groupName}</span>
              <span style="display:flex;gap:6px;flex-wrap:wrap;align-items:center;">
                <span class="tag-fcn">本金：${formatCurrency(g.fcnAmount)}</span>
                <span class="tag-apr">Coupon：${Number(g.couponRate).toFixed(1)}%</span>
                ${getStatusBadge(g.status)}
              </span>
            </div>
            <div class="stocks">
              ${g.stocks.map(x => {
                const isWorst = x.code === c.worstSymbol;
                return `
                  <div class="stock-card ${getCardClass(g.status)}" data-stockid="${x.stockId}" style="${isWorst ? 'border-width:6px;' : ''}">
                    <div class="line1">${x.code} ${isWorst ? '⭐' : ''}</div>
                    <div class="line2">最新收盤：${x.closeText}</div>
                    <div class="line2">購入價：${formatCurrency(x.buy)}</div>
                    <div class="line-pct">${makeDisplayLine(g.status, x.pctValueText)}</div>
                  </div>
                `;
              }).join('')}
            </div>
            <div class="result-detail">
              <div style="display:flex;flex-wrap:wrap;gap:8px;font-size:13px;">
                <span><strong>最差標的：</strong>${c.worstSymbol || '自動判定'}</span>
                <span><strong>初始價：</strong>${formatCurrency(c.initialPrice)}</span>
                <span><strong>KO 價：</strong>${formatCurrency(c.koPrice)}</span>
                <span><strong>KI 價：</strong>${formatCurrency(c.kiPrice)}</span>
                <span><strong>Strike 價：</strong>${formatCurrency(c.strikePrice)}</span>
              </div>
              <div style="display:flex;flex-wrap:wrap;gap:8px;font-size:13px;margin-top:4px;padding-top:4px;border-top:1px dashed #e2e8f0;">
                <span><strong>每月配息：</strong>${formatCurrency(c.monthlyCoupon)}</span>
                <span><strong>累積月數：</strong>${c.months} / ${c.totalMonths}</span>
                <span><strong>總配息：</strong>${formatCurrency(c.totalCoupon)}</span>
                ${c.shares > 0 ? `<span><strong>換股數：</strong>${c.shares.toFixed(4)}</span>` : ''}
                <span style="font-weight:800;color:#4f46e5;"><strong>最終價值：</strong>${formatCurrency(c.finalValue)}</span>
              </div>
              <div style="font-size:12px;color:#475569;margin-top:4px;padding-top:4px;border-top:1px dashed #e2e8f0;">
                ${c.statusDetail}
                ${c.koDate ? `｜KO 日期：${c.koDate}` : ''}
                ${c.kiDate ? `｜KI 日期：${c.kiDate}` : ''}
              </div>
            </div>
          </div>
        `;

        if (c.months > 0 && c.totalCoupon > 0) {
          profitChartData.push({
            label: `${client} - ${g.groupName}`,
            months: c.months,
            total: c.finalValue,
            color: profitColors[colorIdx % profitColors.length],
            monthly: c.monthlyCoupon,
            status: g.status
          });
          colorIdx++;
        }
      }

      // ===== FCN 圓餅圖（依客戶分開） =====
      const clientFcnData = fcnPieDataByClient[client] || [];
      if (clientFcnData.length > 1) {
        const fcnColors = ['#4f46e5', '#f59e0b', '#ef4444', '#10b981', '#8b5cf6', '#ec4899', '#06b6d4', '#f97316', '#14b8a6'];
        const pieId = `fcnPie_${client.replace(/\s/g, '_')}`;
        html += `
          <div class="fcn-pie-card">
            <div class="pie-title">🥧 ${client} - FCN 名義本金佔比</div>
            <div class="chart-wrap" style="height:260px;">
              <canvas id="${pieId}"></canvas>
            </div>
            <div style="margin-top:6px;display:flex;flex-wrap:wrap;gap:4px;font-size:12px;color:#4b5563;">
              ${clientFcnData.map((d, i) => `
                <span style="display:inline-flex;align-items:center;gap:4px;margin-right:8px;">
                  <span style="display:inline-block;width:12px;height:12px;border-radius:3px;background:${fcnColors[i % fcnColors.length]};"></span>
                  ${d.label}：${formatCurrency(d.value)} (${d.status})
                </span>
              `).join('')}
            </div>
          </div>
        `;
      } else if (clientFcnData.length === 1) {
        html += `
          <div class="fcn-pie-card">
            <div class="pie-title">🥧 ${client} - FCN 名義本金</div>
            <div style="padding:12px;background:#f3f4f6;border-radius:8px;text-align:center;color:#4b5563;font-size:14px;">
              ${clientFcnData[0].label}：${formatCurrency(clientFcnData[0].value)} (${clientFcnData[0].status})
            </div>
          </div>
        `;
      }
      html += `</div>`;
    }

    // ===== 堆疊長條圖 =====
    if (profitChartData.length > 0) {
      html += `
        <div class="card">
          <div class="section-title">📊 各群組最終價值比較</div>
          <div class="small" style="margin-bottom:8px;">顯示各群組的最終價值（本金 + 配息，或換股價值 + 配息）</div>
          <div class="chart-wrap" style="height:320px;">
            <canvas id="profitStackChart"></canvas>
          </div>
        </div>
      `;
    }

    output.innerHTML = html;

    // ===== 繪製堆疊長條圖 =====
    if (profitChartData.length > 0) {
      setTimeout(() => {
        const ctx = document.getElementById('profitStackChart')?.getContext('2d');
        if (!ctx) return;
        const labels = profitChartData.map(d => d.label);
        const totalValues = profitChartData.map(d => d.total);

        new Chart(ctx, {
          type: 'bar',
          data: {
            labels: labels,
            datasets: [{
              label: '最終價值 (USD)',
              data: totalValues,
              backgroundColor: profitChartData.map(d => d.color),
              borderRadius: 6,
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: { display: false },
              tooltip: {
                callbacks: {
                  label: function(context) {
                    const idx = context.dataIndex;
                    const d = profitChartData[idx];
                    return [
                      `最終價值：${formatCurrency(d.total)} USD`,
                      `累積月數：${d.months} 個月`,
                      `每月配息：${formatCurrency(d.monthly)} USD`,
                      `狀態：${d.status}`
                    ];
                  }
                }
              }
            },
            scales: {
              y: {
                beginAtZero: true,
                ticks: { callback: v => formatCurrency(v) }
              }
            }
          }
        });
      }, 300);
    }

    // ===== 繪製 FCN 圓餅圖 =====
    setTimeout(() => {
      const fcnColors = ['#4f46e5', '#f59e0b', '#ef4444', '#10b981', '#8b5cf6', '#ec4899', '#06b6d4', '#f97316', '#14b8a6'];
      for (const [client, data] of Object.entries(fcnPieDataByClient)) {
        if (data.length > 1) {
          const pieId = `fcnPie_${client.replace(/\s/g, '_')}`;
          const ctx = document.getElementById(pieId)?.getContext('2d');
          if (!ctx) continue;
          const total = data.reduce((a, b) => a + b.value, 0);
          new Chart(ctx, {
            type: 'pie',
            data: {
              labels: data.map(d => `${d.label} (${d.status})`),
              datasets: [{
                data: data.map(d => d.value),
                backgroundColor: data.map((_, i) => fcnColors[i % fcnColors.length]),
                borderWidth: 2,
                borderColor: '#fff',
              }]
            },
            options: {
              responsive: true,
              maintainAspectRatio: false,
              plugins: {
                legend: { position: 'right', labels: { font: { size: 11 }, padding: 8, boxWidth: 14 } },
                tooltip: {
                  callbacks: {
                    label: function(context) {
                      const percentage = ((context.parsed / total) * 100).toFixed(1);
                      return `${context.label}：${formatCurrency(context.parsed)} (${percentage}%)`;
                    }
                  }
                }
              }
            }
          });
        }
      }
    }, 400);

    // ===== 股票點擊事件 =====
    document.querySelectorAll('.stock-card').forEach(el => {
      el.addEventListener('click', () => {
        const sid = el.dataset.stockid;
        const stock = stockCache.find(s => s.stockId === sid);
        if (stock) openModal(stock);
      });
    });

  } catch(e) {
    output.innerHTML = `<div class="card" style="color:red;font-weight:bold;">❌ 抓取失敗：${e.message}</div>`;
  }
}

// ========== 圖表 Modal ==========
function drawModalChart(stock) {
  const ctx = document.getElementById('modalChart').getContext('2d');
  if (modalChart) modalChart.destroy();
  const groupEl = document.querySelector(`[data-group-id="${stock.groupId}"]`);
  let koPct = 105, kiPct = 65, strikePct = 75;
  if (groupEl) {
    koPct = Number(groupEl.querySelector('.group-ko')?.value) || 105;
    kiPct = Number(groupEl.querySelector('.group-ki')?.value) || 65;
    strikePct = Number(groupEl.querySelector('.group-strike')?.value) || 75;
  }
  const koPrice = stock.buy * (koPct / 100);
  const strikePrice = stock.buy * (strikePct / 100);
  const kiPrice = stock.buy * (kiPct / 100);
  modalChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: stock.labels,
      datasets: [
        { label: '收盤價', data: stock.closes, borderColor: '#4f46e5', tension: .25, pointRadius: 2, borderWidth: 2 },
        { label: `KO (${koPct}%)`, data: stock.labels.map(() => koPrice), borderColor: '#3b82f6', borderDash: [4,4], pointRadius: 0, borderWidth: 2 },
        { label: `Strike (${strikePct}%)`, data: stock.labels.map(() => strikePrice), borderColor: '#f59e0b', borderDash: [4,4], pointRadius: 0, borderWidth: 2 },
        { label: `KI (${kiPct}%)`, data: stock.labels.map(() => kiPrice), borderColor: '#ef4444', borderDash: [4,4], pointRadius: 0, borderWidth: 2 }
      ]
    },
    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'top' } } }
  });
}

function openModal(stock) {
  document.getElementById('modalTitle').textContent = `${stock.code} / ${stock.name}`;
  document.getElementById('modalInfo').textContent =
    `群組：${stock.group}｜購入價：${formatCurrency(stock.buy)}｜最新價：${stock.closeText}`;
  document.getElementById('chartModal').classList.add('show');
  setTimeout(() => drawModalChart(stock), 0);
}

function closeModal(event) {
  if (event && event.target !== event.currentTarget) return;
  document.getElementById('chartModal').classList.remove('show');
  if (modalChart) { modalChart.destroy(); modalChart = null; }
}

// ========== 初始化 ==========
function init() {
  loadSettings();
  document.getElementById('output').innerHTML = '<div class="card">請輸入資料後，點擊「抓取並顯示」按鈕開始追蹤 FCN 合約。</div>';
}
init();
</script>
</body>
</html>
